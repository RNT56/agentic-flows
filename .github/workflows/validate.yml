name: Validate agentic flows

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.11"

      - name: Install tooling
        run: python -m pip install -r requirements-dev.txt

      - name: Validate flow definitions
        run: flowctl validate

      - name: Validate event examples
        run: flowctl validate-event examples/

      - name: Export feature flow graph
        run: flowctl graph flows/coding/feature-implementation/flow.yaml --format json --output /tmp/feature-flow.graph.json

      - name: Run tests
        run: pytest
