spec_version: agentic-flows/v1.1
id: program.security-hardening-campaign
version: 0.1.0
title: Security hardening campaign
summary: Inventory dependency findings, fan out a bounded per-finding fix-and-verify loop, and export one audit trail for
  the campaign.
stability: experimental
owners:
  - RNT56
tags:
  - program
  - security
  - campaign
entrypoint: intake
runtime:
  supported_cores:
    - crustcore
    - standalone
  required_capabilities:
    - dependency.read
    - advisory.lookup
    - license.check
    - command.run
    - run.read
    - evidence.bundle
    - evidence.capture
    - subflow.dispatch
    - human.review
contracts:
  inputs:
    - id: manifest
      type: uri
      required: true
      description: The dependency manifest to audit.
    - id: policy
      type: markdown
      required: true
      description: The security and license policy to audit against.
    - id: repo
      type: uri
      required: true
      description: Repository or checkout target.
  outputs:
    - id: campaign_report
      type: markdown
      required: true
      description: 'The campaign result: findings, fixes, and residual risk.'
    - id: audit_bundle
      type: json
      required: true
      description: The exported audit trail for the campaign.
  artifacts:
    - program-plan
    - finding-inventory
    - per-finding-scan-log
    - audit-bundle
    - subflows-report
parameters:
  - id: fix_verification_command
    type: text
    required: true
    description: Command that re-runs the scan for one finding to confirm it is hardened.
nodes:
  - id: intake
    type: intake
    title: Intake campaign scope
    description: Capture the manifest, policy, and repo for the campaign.
    produces:
      - program-scope
  - id: plan
    type: plan
    title: Plan the campaign
    description: Order the audit, per-finding hardening, and export, and bind their inputs.
    requires:
      - program-scope
    produces:
      - program-plan
  - id: inventory
    type: flow_ref
    title: Inventory findings
    description: Run the supply-chain audit sub-flow to inventory dependency findings.
    requires:
      - program-plan
    produces:
      - finding-inventory
    ref:
      flow_id: security.supply-chain-audit
      version_constraint: '>=0.1.0 <0.2.0'
    with:
      manifest: '{{input.manifest}}'
      policy: '{{input.policy}}'
    expose:
      audit_findings: finding-inventory
  - id: harden
    type: agent_task
    title: Harden each finding
    description: For each finding, apply a fix and re-run its scan until it is hardened or escalated.
    agent: security-worker
    requires:
      - finding-inventory
    produces:
      - per-finding-scan-log
    iteration:
      max_iterations: 3
      on_exhausted: handoff
      until: gate:instance-hardened
    fan_out:
      aggregate: threshold
      cardinality:
        max: 50
        min: 1
      instance_id: finding
      over: findings
  - id: export
    type: flow_ref
    title: Export audit trail
    description: Run the evidence-bundle-export sub-flow to export the campaign audit trail.
    requires:
      - per-finding-scan-log
    produces:
      - audit-bundle
    ref:
      flow_id: proof.evidence-bundle-export
      version_constraint: '>=0.1.0 <0.2.0'
    with:
      run_bundle: '{{input.repo}}'
      verifier_outcome: '{{artifact.per-finding-scan-log}}'
    expose:
      proof_bundle: audit-bundle
  - id: verify
    type: verifier
    title: Verify the campaign
    description: Aggregate sub-flow and per-finding evidence into a campaign report.
    requires:
      - audit-bundle
    produces:
      - subflows-report
  - id: accept
    type: approval
    title: Campaign acceptance
    description: A security owner accepts the campaign result.
    requires:
      - subflows-report
  - id: final
    type: finalizer
    title: Close out campaign
    description: Return the campaign report and the exported audit bundle.
    requires:
      - subflows-report
    produces:
      - campaign_report
      - audit_bundle
edges:
  - from: intake
    to: plan
  - from: plan
    to: inventory
  - from: inventory
    to: harden
  - from: harden
    to: export
  - from: export
    to: verify
  - from: verify
    to: accept
  - from: accept
    to: final
quality_gates:
  - id: inventory-complete
    title: Finding inventory complete
    type: artifact
    required: true
    evidence: The audit produced a complete finding inventory.
    evidence_refs:
      - finding-inventory
    evidence_class: deterministic
  - id: instance-hardened
    title: Each finding hardened or escalated
    type: command
    required: true
    command: '{{param.fix_verification_command}}'
    evidence: Per-finding scan re-run confirming the fix.
    evidence_refs:
      - per-finding-scan-log
    evidence_class: deterministic
  - id: campaign-accepted
    title: Campaign accepted
    type: acceptance
    required: true
    evidence: A security owner accepted the campaign result.
    evidence_refs:
      - subflows-report
    evidence_class: judgment
    criteria:
      - Every finding is fixed or explicitly escalated
      - Audit trail is exported
      - Reviewer is independent of the producing agents
observability:
  events:
    - flow.started
    - node.completed
    - subflow.started
    - subflow.completed
    - gate.completed
    - flow.completed
  metrics:
    - subflows.count
    - duration.seconds
