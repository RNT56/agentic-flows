spec_version: agentic-flows/v1
id: program.connector-productionization
version: 0.1.0
title: Connector productionization
summary: Take an experimental connector to production readiness with reviewed permissions and tested failure modes.
stability: experimental
owners:
  - RNT56
tags:
  - program
  - connector
  - readiness
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - nilcore
    - crustcore
    - standalone
  required_capabilities:
    - connector.read
    - command.run
    - human.review
    - evidence.capture
  adapter_hints:
    crustcore:
      proof_surface: readiness-evidence
    nilcore:
      execution_mode: sandboxed-worker
contracts:
  inputs:
    - id: connector
      type: markdown
      required: true
      description: The experimental connector to productionize.
    - id: readiness_policy
      type: markdown
      required: true
      description: The production-readiness policy.
  outputs:
    - id: readiness_report
      type: json
      required: true
      description: The readiness verdict across permissions, failures, observability, and docs.
    - id: production_checklist
      type: markdown
      required: true
      description: The remaining checklist before enabling in production.
  artifacts:
    - permission-review
    - failure-tests
    - observability-check
nodes:
  - id: intake
    type: intake
    title: Intake connector
    description: Capture the connector and the readiness policy.
    instructions: Record the connector under productionization and the production-readiness policy it must satisfy, so the
      permission review, failure tests, and observability check can be scoped against named criteria.
    inputs_schema:
      - id: connector
        type: markdown
        required: true
        description: The experimental connector to productionize.
      - id: readiness_policy
        type: markdown
        required: true
        description: The production-readiness policy to evaluate against.
    produces:
      - productionization-scope
  - id: permissions
    type: agent_task
    title: Review permissions
    description: Review the connector permissions for least privilege.
    instructions: Inspect every scope and credential the connector requests and decide per scope whether it is least-privilege,
      recording the justification or the reduction needed. This step needs a security agent supplied by the consumer.
    agent: security-analyst
    requires:
      - productionization-scope
    produces:
      - permission-review
  - id: harden
    type: tool
    title: Test failure modes
    description: Test the connector failure modes and retries.
    instructions: Run the connector failure-mode and retry tests and capture stdout, stderr, and the exit code as evidence
      that timeouts, errors, and retries behave as the readiness policy expects.
    command: ${param.failure_test_command}
    parameters:
      - id: failure_test_command
        type: command
        required: false
        default: make test || npm test || pytest -q
        description: The command that exercises the connector failure modes and retries.
    tool: command-runner
    requires:
      - permission-review
    produces:
      - failure-tests
    on_failure:
      action: abort
  - id: observe
    type: agent_task
    title: Check observability and docs
    description: Confirm observability and documentation are complete.
    instructions: Confirm the connector emits the metrics, logs, and traces the policy requires and that its operational docs
      cover setup, limits, and failure handling, noting any gap. This step needs a reliability agent supplied by the consumer.
    agent: reliability-analyst
    requires:
      - failure-tests
    produces:
      - observability-check
  - id: verify
    type: verifier
    title: Verify readiness
    description: Confirm permissions are reviewed, failure modes tested, and observability and docs complete.
    instructions: Confirm the permission review reached a least-privilege decision per scope, the failure tests passed, and
      observability and docs are complete, then record a readiness verdict with the gaps that remain.
    requires:
      - failure-tests
      - observability-check
    produces:
      - readiness-verdict
    on_failure:
      action: abort
  - id: final
    type: finalizer
    title: Close out productionization
    description: Return the readiness report and the remaining checklist.
    instructions: Return the readiness report covering permissions, failures, observability, and docs, plus the checklist
      of items remaining before the connector can be enabled in production.
    requires:
      - permission-review
      - readiness-verdict
    produces:
      - readiness_report
      - production_checklist
edges:
  - from: intake
    to: permissions
  - from: permissions
    to: harden
  - from: harden
    to: observe
  - from: observe
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: permissions-reviewed
    title: Permissions reviewed
    type: artifact
    required: true
    evidence: The permission review records a least-privilege decision per scope.
    evidence_refs:
      - permission-review
  - id: failure-modes-tested
    title: Failure modes tested
    type: command
    required: true
    command: make test || npm test || pytest -q
    evidence: The connector failure modes are tested.
    evidence_refs:
      - failure-tests
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - failure.cases
    - duration.seconds
