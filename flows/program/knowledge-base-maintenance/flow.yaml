spec_version: agentic-flows/v1
id: program.knowledge-base-maintenance
version: 0.1.0
title: Knowledge base maintenance
summary: Keep docs, decisions, and examples current by detecting stale items and applying sourced, conservative updates.
stability: experimental
owners:
  - RNT56
tags:
  - program
  - knowledge
  - maintenance
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - nilcore
    - standalone
  required_capabilities:
    - docs.read
    - command.run
    - evidence.capture
  adapter_hints:
    nilcore:
      execution_mode: sandboxed-worker
    thinclaw:
      routine_type: operator-supervised
contracts:
  inputs:
    - id: knowledge_root
      type: uri
      required: true
      description: The knowledge base root to maintain.
    - id: scope
      type: markdown
      required: true
      description: What to maintain and any do-not-touch boundaries.
  outputs:
    - id: maintenance_report
      type: markdown
      required: true
      description: What was stale, what was updated, and what was left alone.
    - id: updates
      type: json
      required: true
      description: The applied updates with their sources.
  artifacts:
    - staleness-scan
    - update-plan
    - maintenance-log
nodes:
  - id: intake
    type: intake
    title: Intake scope
    description: Capture the knowledge base root and the maintenance scope.
    instructions: Record the knowledge base root and the maintenance scope, including any do-not-touch boundaries, so the
      staleness scan and update plan stay inside the agreed surface.
    inputs_schema:
      - id: knowledge_root
        type: uri
        required: true
        description: The knowledge base root to maintain.
      - id: scope
        type: markdown
        required: true
        description: What to maintain and any do-not-touch boundaries.
    produces:
      - kb-scope
  - id: scan
    type: tool
    title: Scan for staleness
    description: Detect stale docs, decisions, and examples.
    instructions: Scan the docs, decisions, and examples under the knowledge root and list every item that is out of date,
      with the signal that makes it stale, while respecting the do-not-touch boundaries.
    tool: docs-scanner
    requires:
      - kb-scope
    produces:
      - staleness-scan
  - id: plan
    type: plan
    title: Plan updates
    description: Plan sourced updates and mark deletions as conservative.
    instructions: For each stale item plan a concrete update with a citable source, and mark any deletion as conservative
      so nothing is removed without justification. Name the files you expect to change.
    requires:
      - staleness-scan
    produces:
      - update-plan
  - id: apply
    type: agent_task
    title: Apply updates
    description: Apply the planned updates with their sources.
    instructions: Apply only the updates in the plan, recording the source cited for each change and leaving out-of-scope
      items untouched, then log what was changed and what was left alone. This step needs a docs agent supplied by the consumer.
    agent: docs-writer
    requires:
      - update-plan
    produces:
      - maintenance-log
  - id: verify
    type: verifier
    title: Verify maintenance
    description: Confirm stale items were detected, updates cite sources, and deletions are conservative.
    instructions: Confirm the scan detected the stale items, every applied update cites a source, and deletions stayed conservative,
      recording any change that lacks a source as a failure.
    requires:
      - update-plan
      - maintenance-log
    produces:
      - maintenance-check
  - id: final
    type: finalizer
    title: Close out maintenance
    description: Return the maintenance report and the applied updates.
    instructions: Return the maintenance report describing what was stale, what was updated, and what was left alone, alongside
      the applied updates with their sources.
    requires:
      - maintenance-log
      - maintenance-check
    produces:
      - maintenance_report
      - updates
edges:
  - from: intake
    to: scan
  - from: scan
    to: plan
  - from: plan
    to: apply
  - from: apply
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: stale-items-detected
    title: Stale items detected
    type: artifact
    required: true
    evidence: The staleness scan lists the items that are out of date.
    evidence_refs:
      - staleness-scan
  - id: updates-cite-sources
    title: Updates cite sources and deletions are conservative
    type: review
    required: true
    evidence: The update plan cites a source for each change and keeps deletions conservative.
    evidence_refs:
      - update-plan
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - stale.items
    - duration.seconds
