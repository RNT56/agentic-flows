spec_version: agentic-flows/v1
id: coding.refactor-and-verify
version: 0.1.0
title: Refactor and verify
summary: Change internal structure without intended behavior changes, then prove equivalence through tests and review.
stability: preview
owners:
  - RNT56
tags:
  - coding
  - refactor
  - verification
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - nilcore
    - crustcore
    - standalone
  required_capabilities:
    - repo.checkout
    - patch.apply
    - command.run
    - evidence.capture
contracts:
  inputs:
    - id: task
      type: markdown
      required: true
      description: Refactor target, constraints, and non-goals.
    - id: repo
      type: uri
      required: true
      description: Repository or local checkout target.
  outputs:
    - id: patch
      type: patch
      required: true
      description: Refactor diff.
    - id: equivalence_report
      type: markdown
      required: true
      description: Evidence that behavior remained stable.
  artifacts:
    - plan
    - diff
    - baseline-log
    - post-refactor-log
    - equivalence-report
nodes:
  - id: intake
    type: intake
    title: Intake refactor target
    description: Capture target modules, explicit behavior invariants, and forbidden changes.
    instructions: Record the refactor target, the public behavior invariants that must hold, and the changes that are out
      of bounds, then freeze this scope so the refactor cannot drift into behavior change.
    inputs_schema:
      - id: task
        type: markdown
        required: true
        description: The refactor target, constraints, and non-goals.
      - id: repo
        type: uri
        required: true
        description: The repository or checkout to refactor.
    produces:
      - refactor-scope
  - id: baseline
    type: tool
    title: Capture baseline checks
    description: Run available checks before the refactor when practical.
    instructions: Run the project checks against the unchanged code and capture stdout, stderr, and the exit code as the pre-refactor
      baseline to compare against later.
    command: ${param.test_command}
    parameters:
      - id: test_command
        type: command
        required: false
        default: make test || npm test || cargo test || go test ./...
        description: The command that runs the project checks for the baseline.
    tool: command-runner
    requires:
      - refactor-scope
    produces:
      - baseline-log
    on_failure:
      action: abort
  - id: plan
    type: plan
    title: Plan internal rewrite
    description: Identify the smallest internal changes that preserve public behavior.
    instructions: Identify the smallest set of internal changes that reach the refactor target while leaving every declared
      invariant intact, and name the modules and the checks that will demonstrate equivalence.
    requires:
      - refactor-scope
      - baseline-log
    produces:
      - refactor-plan
  - id: implement
    type: agent_task
    title: Apply refactor
    description: Modify internals without broadening scope or changing user-visible behavior.
    instructions: Apply only the internal changes named in the plan, hold every user-visible behavior constant, and avoid
      widening scope. This step needs a coding agent supplied by the consumer.
    agent: coding-worker
    requires:
      - refactor-plan
    produces:
      - patch
  - id: verify
    type: verifier
    title: Verify behavior preservation
    description: Run checks and compare expected public behavior with the baseline.
    instructions: Re-run the project checks on the refactored code, capture the result as the post-refactor log, and compare
      it against the baseline to prove no declared invariant changed.
    requires:
      - patch
    produces:
      - post-refactor-log
      - equivalence-report
    on_failure:
      action: abort
  - id: final
    type: finalizer
    title: Close out refactor
    description: Return the diff, checks, and remaining behavioral risk.
    instructions: Return the refactor diff, the equivalence report comparing baseline to post-refactor checks, and any residual
      behavioral risk a reviewer should weigh.
    requires:
      - equivalence-report
    produces:
      - equivalence_report
edges:
  - from: intake
    to: baseline
  - from: baseline
    to: plan
  - from: plan
    to: implement
  - from: implement
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: checks-pass-after-refactor
    title: Checks pass after refactor
    type: command
    required: true
    command: make test || npm test || cargo test || go test ./...
    evidence: Post-refactor check output.
    evidence_refs:
      - post-refactor-log
  - id: no-intended-behavior-change
    title: No intended behavior change
    type: review
    required: true
    evidence: Verifier comparison against declared invariants.
    evidence_refs:
      - equivalence-report
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - duration.seconds
    - changed.files
