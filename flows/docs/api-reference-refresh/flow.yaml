spec_version: agentic-flows/v1
id: docs.api-reference-refresh
version: 0.1.0
title: API reference refresh
summary: Update API docs from current schemas and types, reconciling generated and hand-written docs and validating examples.
stability: experimental
owners:
  - RNT56
tags:
  - docs
  - api
  - reference
entrypoint: intake
runtime:
  supported_cores:
    - nilcore
    - standalone
  required_capabilities:
    - schema.read
    - command.run
    - evidence.capture
  adapter_hints:
    nilcore:
      execution_mode: sandboxed-worker
contracts:
  inputs:
    - id: api_source
      type: uri
      required: true
      description: The schemas or types the reference is generated from.
    - id: docs_root
      type: uri
      required: true
      description: The documentation root to update.
  outputs:
    - id: docs_patch
      type: patch
      required: true
      description: The updated API reference docs.
    - id: reconciliation
      type: markdown
      required: true
      description: How generated and hand-written docs were reconciled.
  artifacts:
    - generated-docs
    - example-log
    - reconciliation-notes
nodes:
  - id: intake
    type: intake
    title: Intake refresh scope
    description: Capture the API source and the documentation root.
    instructions: Record the API source the reference is generated from and the documentation root to update, so generation
      and reconciliation target the right files.
    inputs_schema:
      - id: api_source
        type: uri
        required: true
        description: The schemas or types the reference is generated from.
      - id: docs_root
        type: uri
        required: true
        description: The documentation root to update.
    produces:
      - refresh-scope
  - id: generate
    type: tool
    title: Generate reference
    description: Generate the API reference from the current schemas and types.
    instructions: Run the project documentation generator against the current schemas and types and capture the generated
      reference output as evidence for reconciliation.
    tool: doc-generator
    requires:
      - refresh-scope
    produces:
      - generated-docs
  - id: examples
    type: tool
    title: Validate examples
    description: Compile or validate the documentation examples.
    instructions: Compile or run the documentation examples and capture stdout, stderr, and the exit code so broken examples
      are caught before reconciliation.
    command: ${param.example_command}
    parameters:
      - id: example_command
        type: command
        required: false
        default: make test || npm test || pytest -q
        description: The command that compiles or validates the documentation examples.
    tool: command-runner
    requires:
      - generated-docs
    produces:
      - example-log
    on_failure:
      action: abort
  - id: reconcile
    type: agent_task
    title: Reconcile docs
    description: Reconcile generated output with hand-written prose, keeping both consistent.
    instructions: Merge the generated reference with the hand-written prose so the two agree, note every divergence and how
      it was resolved, and keep validated examples intact. This step needs a docs writer supplied by the consumer.
    agent: docs-writer
    requires:
      - generated-docs
      - example-log
    produces:
      - reconciliation-notes
  - id: verify
    type: verifier
    title: Verify reconciliation
    description: Confirm generated and hand-written docs agree and examples validate.
    instructions: Confirm the reconciliation notes show generated output agrees with the hand-written prose and that the example
      log shows every example compiled or validated.
    requires:
      - reconciliation-notes
    produces:
      - refresh-check
  - id: final
    type: finalizer
    title: Close out refresh
    description: Return the docs patch and the reconciliation summary.
    instructions: Return the documentation patch and the reconciliation summary describing how generated and hand-written
      docs were brought into agreement.
    requires:
      - reconciliation-notes
      - refresh-check
    produces:
      - docs_patch
      - reconciliation
edges:
  - from: intake
    to: generate
  - from: generate
    to: examples
  - from: examples
    to: reconcile
  - from: reconcile
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: docs-reconciled
    title: Generated and hand-written docs reconciled
    type: review
    required: true
    evidence: The reconciliation notes show generated output agrees with hand-written prose.
    evidence_refs:
      - reconciliation-notes
  - id: examples-validate
    title: Examples compile or validate
    type: command
    required: true
    command: make test || npm test || pytest -q
    evidence: The documentation examples compile or validate.
    evidence_refs:
      - example-log
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - examples.checked
    - duration.seconds
