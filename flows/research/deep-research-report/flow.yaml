spec_version: agentic-flows/v1
id: research.deep-research-report
version: 0.1.0
title: Deep research report
summary: Gather, compare, and synthesize sources into an evidence-backed report with caveats.
stability: experimental
owners:
  - RNT56
tags:
  - research
  - report
  - evidence
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - nilcore
    - standalone
  required_capabilities:
    - web.research
    - source.citation
    - evidence.capture
    - human.review
contracts:
  inputs:
    - id: question
      type: markdown
      required: true
      description: Research question, audience, and decision context.
    - id: constraints
      type: markdown
      required: false
      description: Time, source, or citation constraints.
  outputs:
    - id: report
      type: markdown
      required: true
      description: Answer-first report with evidence and caveats.
    - id: bibliography
      type: json
      required: true
      description: Structured list of sources and retrieval metadata.
  artifacts:
    - source-log
    - synthesis-notes
nodes:
  - id: intake
    type: intake
    title: Intake question
    description: Clarify the decision, audience, source constraints, and freshness requirements.
    instructions: Record the research question, the audience, the decision it informs, and any time, source, or citation constraints,
      then state the freshness window so later gathering stays in scope.
    inputs_schema:
      - id: question
        type: markdown
        required: true
        description: Research question, audience, and decision context.
      - id: constraints
        type: markdown
        required: false
        description: Time, source, or citation constraints.
    produces:
      - research-brief
  - id: gather
    type: agent_task
    title: Gather sources
    description: Collect primary and high-quality secondary sources with retrieval metadata.
    instructions: Collect primary and high-quality secondary sources that bear on the question, and for each record the title,
      URL or locator, author or publisher, and retrieval date into the source log. Done when the brief's sub-questions are
      each backed by at least one credible source. This step needs a research agent supplied by the consumer.
    agent: research-worker
    requires:
      - research-brief
    produces:
      - source-log
  - id: compare
    type: verifier
    title: Compare evidence
    description: Reconcile conflicting claims and identify confidence, gaps, and source quality issues.
    instructions: Reconcile the gathered sources against each other, flag where they disagree, and rate confidence per claim
      while naming the remaining gaps and any weak or low-quality sources. Capture the reasoning in the synthesis notes.
    requires:
      - source-log
    produces:
      - synthesis-notes
  - id: write
    type: agent_task
    title: Draft report
    description: Produce an answer-first report with citations, caveats, and decision implications.
    instructions: Write an answer-first report that leads with the conclusion, cites every load-bearing claim back to the
      source log, states caveats and unresolved disagreements, and spells out what the finding means for the decision. This
      step needs a writing agent supplied by the consumer.
    agent: report-writer
    requires:
      - synthesis-notes
    produces:
      - report-draft
  - id: review
    type: approval
    title: Human factuality review
    description: Request human review when the report supports a high-impact decision.
    instructions: When the report informs a high-impact or irreversible decision, ask a human to check the headline claims
      against their cited sources, then record the reviewer, the decision, and any corrections.
    requires:
      - report-draft
  - id: final
    type: finalizer
    title: Close out research
    description: Return the final report and structured bibliography.
    instructions: Return the answer-first report and a structured bibliography listing every cited source with its id, locator,
      and retrieval date.
    requires:
      - report-draft
    produces:
      - report
      - bibliography
edges:
  - from: intake
    to: gather
  - from: gather
    to: compare
  - from: compare
    to: write
  - from: write
    to: review
    condition: high-impact-decision
  - from: write
    to: final
    condition: review-not-required
  - from: review
    to: final
quality_gates:
  - id: citations-present
    title: Citations present
    type: artifact
    required: true
    evidence: Report contains source references and bibliography metadata.
    evidence_refs:
      - source-log
  - id: conflicting-evidence-addressed
    title: Conflicting evidence addressed
    type: review
    required: true
    evidence: Synthesis notes identify unresolved disagreements or gaps.
    evidence_refs:
      - synthesis-notes
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - sources.count
    - duration.seconds
