spec_version: agentic-flows/v1
id: product.feedback-to-roadmap
version: 0.1.0
title: Feedback to roadmap
summary: Turn collected user feedback into cited themes, opportunities, and prioritized tasks with rationale.
stability: experimental
owners:
  - RNT56
tags:
  - product
  - feedback
  - roadmap
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - standalone
  required_capabilities:
    - feedback.read
    - evidence.capture
  adapter_hints:
    thinclaw:
      routine_type: operator-supervised
contracts:
  inputs:
    - id: feedback
      type: markdown
      required: true
      description: The collected feedback items to synthesize.
    - id: goals
      type: markdown
      required: true
      description: The product goals to prioritize against.
  outputs:
    - id: roadmap
      type: markdown
      required: true
      description: Prioritized opportunities with rationale.
    - id: themes
      type: json
      required: true
      description: The feedback themes with cited source ids.
  artifacts:
    - theme-map
    - opportunity-list
    - roadmap-draft
nodes:
  - id: intake
    type: intake
    title: Intake feedback
    description: Capture the feedback items and the product goals.
    instructions: Record the collected feedback items to synthesize and the product goals to prioritize against, and make
      sure each feedback item carries a stable source id that later themes can cite.
    inputs_schema:
      - id: feedback
        type: markdown
        required: true
        description: The collected feedback items to synthesize.
      - id: goals
        type: markdown
        required: true
        description: The product goals to prioritize against.
    produces:
      - feedback-context
  - id: cluster
    type: agent_task
    title: Cluster into themes
    description: Cluster feedback into themes, citing source ids and preserving minority signals.
    instructions: Group the feedback into themes, citing the source ids that back each theme, and keep minority or dissenting
      signals visible instead of averaging them away. Every theme must trace back to specific feedback items. This step needs
      a product-analyst agent supplied by the consumer.
    agent: product-analyst
    requires:
      - feedback-context
    produces:
      - theme-map
  - id: prioritize
    type: agent_task
    title: Prioritize opportunities
    description: Turn themes into opportunities and prioritize them with explicit rationale.
    instructions: Turn the themes into candidate opportunities and rank them against the product goals, giving each priority
      an explicit rationale that ties it to the supporting themes and goals. This step needs a product-analyst agent supplied
      by the consumer.
    agent: product-analyst
    requires:
      - theme-map
    produces:
      - opportunity-list
  - id: verify
    type: verifier
    title: Verify synthesis
    description: Confirm sources are cited, minority signals are kept, and priorities have rationale.
    instructions: Confirm each theme cites its source ids, minority signals are preserved, and every prioritized opportunity
      carries a rationale, then assemble the roadmap draft. Flag any uncited theme or unjustified priority rather than passing
      it.
    requires:
      - theme-map
      - opportunity-list
    produces:
      - roadmap-draft
  - id: final
    type: finalizer
    title: Close out roadmap
    description: Return the prioritized roadmap and the cited themes.
    instructions: Return the prioritized roadmap with rationale and the cited themes keyed to their source ids.
    requires:
      - opportunity-list
      - roadmap-draft
    produces:
      - roadmap
      - themes
edges:
  - from: intake
    to: cluster
  - from: cluster
    to: prioritize
  - from: prioritize
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: feedback-sources-cited
    title: Themes cite feedback sources
    type: review
    required: true
    evidence: Each theme cites its source items and minority signals are preserved.
    evidence_refs:
      - theme-map
  - id: priorities-have-rationale
    title: Priorities have rationale
    type: review
    required: true
    evidence: Each prioritized opportunity has an explicit rationale.
    evidence_refs:
      - opportunity-list
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - themes.count
    - duration.seconds
