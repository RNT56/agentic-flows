spec_version: agentic-flows/v1.1
id: product.release-positioning
version: 0.1.0
title: Release positioning
summary: Produce release framing, public copy, and risk-aware rollout notes, with claims supported by shipped behavior.
stability: experimental
owners:
  - RNT56
tags:
  - product
  - release
  - positioning
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - standalone
  required_capabilities:
    - evidence.capture
    - human.review
contracts:
  inputs:
    - id: release
      type: markdown
      required: true
      description: The shipped work to position.
    - id: audience
      type: markdown
      required: true
      description: The target audience and channel.
  outputs:
    - id: positioning
      type: markdown
      required: true
      description: The release framing, public copy, and rollout notes.
    - id: claims_map
      type: json
      required: true
      description: Each claim mapped to the shipped behavior that supports it.
  artifacts:
    - release-positioning-plan
    - release-positioning-evidence
    - release-positioning-analysis
    - release-positioning-record
nodes:
  - id: intake
    type: intake
    title: Intake scope
    description: Capture the scope and sources for release positioning.
    produces:
      - scope
  - id: plan
    type: plan
    title: Plan the work
    description: Plan which sources to read and how to attribute the result.
    requires:
      - scope
    produces:
      - release-positioning-plan
  - id: gather
    type: agent_task
    title: Map claims to behavior
    description: Map each intended claim to the shipped behavior in the changelog and code that supports it.
    agent: positioning-worker
    requires:
      - release-positioning-plan
    produces:
      - release-positioning-evidence
  - id: analyze
    type: agent_task
    title: Frame the release
    description: Frame the release and draft public copy with risk-aware rollout notes.
    agent: positioning-worker
    requires:
      - release-positioning-evidence
    produces:
      - release-positioning-analysis
  - id: produce
    type: agent_task
    title: Assemble positioning
    description: Assemble the positioning, copy, and the claim-to-behavior map.
    agent: positioning-worker
    requires:
      - release-positioning-analysis
    produces:
      - release-positioning-record
  - id: review
    type: approval
    title: Review decision
    description: An accountable reviewer signs off before closeout.
    requires:
      - release-positioning-record
  - id: final
    type: finalizer
    title: Close out
    description: Return the analysis and the decision record.
    requires:
      - release-positioning-analysis
      - release-positioning-record
    produces:
      - positioning
      - claims_map
edges:
  - from: intake
    to: plan
  - from: plan
    to: gather
  - from: gather
    to: analyze
  - from: analyze
    to: produce
  - from: produce
    to: review
  - from: review
    to: final
quality_gates:
  - id: claims-mapped-to-behavior
    title: Claims map to shipped behavior
    type: artifact
    required: true
    evidence: Every public claim maps to a shipped behavior; the map is recorded.
    evidence_refs:
      - release-positioning-evidence
    evidence_class: deterministic
  - id: no-unshipped-claim
    title: No unshipped claim
    type: judgment
    required: true
    evidence: No claim is made about unshipped behavior.
    evidence_refs:
      - release-positioning-record
    evidence_class: judgment
    criteria:
      - Every claim is supported by shipped behavior
      - Caveats and limitations are explicit
      - The audience and channel are selected
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - duration.seconds
