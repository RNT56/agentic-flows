spec_version: agentic-flows/v1
id: engineering.issue-to-verified-pr
version: 0.1.0
title: Issue to verified PR
summary: Take a scoped issue to a branch, implementation, passing checks, and a draft PR that cites its evidence.
stability: experimental
owners:
  - RNT56
tags:
  - engineering
  - pull-request
  - verification
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - nilcore
    - crustcore
    - standalone
  required_capabilities:
    - repo.checkout
    - patch.apply
    - command.run
    - evidence.capture
    - human.review
    - pr.draft
  adapter_hints:
    crustcore:
      proof_surface: verified-patch
    nilcore:
      execution_mode: sandboxed-worker
    thinclaw:
      routine_type: operator-supervised
contracts:
  inputs:
    - id: issue
      type: markdown
      required: true
      description: Scoped issue with acceptance criteria and constraints.
    - id: repo
      type: uri
      required: true
      description: Repository or local checkout target.
  outputs:
    - id: patch
      type: patch
      required: true
      description: Source changes implementing the frozen issue scope.
    - id: pr_summary
      type: markdown
      required: true
      description: Draft PR summary citing changed files and validation evidence.
  artifacts:
    - implementation-plan
    - diff
    - test-log
    - review-notes
nodes:
  - id: intake
    type: intake
    title: Intake issue scope
    description: Capture the issue, repo target, constraints, and frozen acceptance criteria.
    instructions: Record the issue, the repo target, the constraints, and the acceptance criteria, and freeze the scope so
      the branch, implementation, and PR all map back to it.
    inputs_schema:
      - id: issue
        type: markdown
        required: true
        description: Scoped issue with acceptance criteria and constraints.
      - id: repo
        type: uri
        required: true
        description: The repository or checkout to change.
    produces:
      - scoped-issue
  - id: plan
    type: plan
    title: Plan implementation and checks
    description: Identify touched modules, the verification strategy, and the branch and PR shape.
    instructions: Identify the smallest set of modules to touch, the tests or checks that will prove the change, and the branch
      name and PR shape. Name the files you expect to change.
    requires:
      - scoped-issue
    produces:
      - implementation-plan
  - id: implement
    type: agent_task
    title: Implement scoped change
    description: Apply the smallest coherent change on a branch for the frozen scope.
    instructions: On a working branch, apply the smallest coherent change that satisfies the frozen issue scope, touching
      only modules named in the plan and preserving unrelated user changes. This step needs a coding agent supplied by the
      consumer.
    agent: coding-worker
    requires:
      - implementation-plan
    produces:
      - patch
      - diff
    policy:
      preserve_user_changes: true
  - id: test
    type: tool
    title: Run focused checks
    description: Run the tests, linters, or build commands selected during planning.
    instructions: Run the checks selected during planning and capture stdout, stderr, and the exit code as evidence that the
      change passes before the PR is drafted.
    command: ${param.test_command}
    parameters:
      - id: test_command
        type: command
        required: false
        default: make test || npm test || cargo test || go test ./...
        description: The command that runs the focused project checks for the change.
    tool: command-runner
    requires:
      - patch
    produces:
      - test-log
    on_failure:
      action: abort
  - id: verify
    type: verifier
    title: Verify scope and acceptance
    description: Confirm the change matches the frozen scope and acceptance criteria, and collect evidence.
    instructions: Compare the change and the test results against the frozen scope and each acceptance criterion, and write
      review notes that map every criterion to the evidence that satisfies it.
    requires:
      - patch
      - test-log
    produces:
      - review-notes
      - verification-result
  - id: approval
    type: approval
    title: Human review decision
    description: Request operator approval when behavior, public API, or deployment risk changed.
    instructions: Ask the operator to approve when the change alters public API, behavior, or deployment risk, and record
      the decision and its rationale.
    requires:
      - verification-result
    policy:
      human_required_when:
        - public_api_change
        - behavior_change
        - production_deploy
  - id: final
    type: finalizer
    title: Draft the PR
    description: Return the patch and a draft PR summary citing changed files and validation evidence.
    instructions: Return the patch and a draft PR summary that cites the changed files, the validation evidence, and how the
      change maps back to the frozen issue scope.
    requires:
      - verification-result
    produces:
      - pr_summary
edges:
  - from: intake
    to: plan
  - from: plan
    to: implement
  - from: implement
    to: test
  - from: test
    to: verify
  - from: verify
    to: approval
    condition: approval-required
  - from: verify
    to: final
    condition: approval-not-required
  - from: approval
    to: final
quality_gates:
  - id: tests-pass
    title: Project checks pass
    type: command
    required: true
    command: make test || npm test || cargo test || go test ./...
    evidence: Test, build, or lint output selected during planning.
    evidence_refs:
      - test-log
  - id: scope-frozen
    title: Change stays within frozen scope
    type: review
    required: true
    evidence: Verifier notes mapping the change back to the frozen issue scope.
    evidence_refs:
      - review-notes
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - approval.requested
    - approval.completed
    - flow.completed
  metrics:
    - changed.files
    - tests.executed
    - duration.seconds
