spec_version: agentic-flows/v1
id: engineering.api-contract-change
version: 0.1.0
title: API contract change
summary: Change an API contract while enumerating consumers, updating docs and tests, and proving compatibility.
stability: experimental
owners:
  - RNT56
tags:
  - engineering
  - api
  - compatibility
entrypoint: intake
runtime:
  supported_cores:
    - nilcore
    - crustcore
    - standalone
  required_capabilities:
    - api.read
    - patch.apply
    - command.run
    - evidence.capture
  adapter_hints:
    crustcore:
      proof_surface: verified-patch
    nilcore:
      execution_mode: sandboxed-worker
contracts:
  inputs:
    - id: contract_change
      type: markdown
      required: true
      description: The API contract change and its motivation.
    - id: repo
      type: uri
      required: true
      description: Repository or local checkout target.
  outputs:
    - id: change_patch
      type: patch
      required: true
      description: The contract change plus client, doc, and test updates.
    - id: compatibility_notes
      type: markdown
      required: true
      description: The compatibility story for the enumerated consumers.
  artifacts:
    - consumer-inventory
    - change-diff
    - test-log
    - compatibility-notes
nodes:
  - id: intake
    type: intake
    title: Intake contract change
    description: Capture the proposed API contract change and the repo target.
    instructions: Capture the proposed API contract change, its motivation, and the repo target so consumers can be enumerated
      and compatibility reasoned about.
    inputs_schema:
      - id: contract_change
        type: markdown
        required: true
        description: The API contract change and its motivation.
      - id: repo
        type: uri
        required: true
        description: Repository or local checkout target.
    produces:
      - change-scope
  - id: enumerate
    type: agent_task
    title: Enumerate consumers
    description: Enumerate the consumers of the contract and the surfaces they depend on.
    instructions: List every consumer of the contract and the specific surfaces each depends on, so no dependent is missed
      by the compatibility story. This step needs an API analyst supplied by the consumer.
    agent: api-analyst
    requires:
      - change-scope
    produces:
      - consumer-inventory
  - id: apply
    type: agent_task
    title: Apply change and updates
    description: Apply the contract change and update clients, docs, and tests.
    instructions: Apply the contract change and update the affected clients, documentation, and tests in one coherent patch
      covering every consumer named in the inventory. This step needs a coding agent supplied by the consumer.
    agent: coding-worker
    requires:
      - consumer-inventory
    produces:
      - change-diff
  - id: test
    type: tool
    title: Run checks
    description: Run the tests and any contract or schema generation checks.
    instructions: Run the project tests plus any contract or schema generation checks, and capture stdout, stderr, and the
      exit code as evidence.
    command: ${param.test_command}
    parameters:
      - id: test_command
        type: command
        required: false
        default: make test || npm test || cargo test || go test ./...
        description: The command that runs the project tests and contract or schema checks.
    tool: command-runner
    requires:
      - change-diff
    produces:
      - test-log
    on_failure:
      action: abort
  - id: verify
    type: verifier
    title: Verify compatibility
    description: Confirm the compatibility story holds for every enumerated consumer.
    instructions: Confirm the compatibility story holds for every consumer in the inventory and is backed by the test results,
      and write the compatibility notes that map each consumer to its evidence.
    requires:
      - change-diff
      - test-log
    produces:
      - compatibility-notes
  - id: final
    type: finalizer
    title: Close out change
    description: Return the change patch and the compatibility notes.
    instructions: Return the change patch covering the contract, clients, docs, and tests, together with the compatibility
      notes for every enumerated consumer.
    requires:
      - consumer-inventory
      - compatibility-notes
    produces:
      - change_patch
      - compatibility_notes
edges:
  - from: intake
    to: enumerate
  - from: enumerate
    to: apply
  - from: apply
    to: test
  - from: test
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: consumers-enumerated
    title: Consumers are enumerated
    type: artifact
    required: true
    evidence: The consumer inventory lists every dependent of the contract.
    evidence_refs:
      - consumer-inventory
  - id: compatibility-story
    title: Compatibility story exists
    type: review
    required: true
    evidence: The notes explain compatibility for every enumerated consumer.
    evidence_refs:
      - compatibility-notes
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - consumers.count
    - duration.seconds
