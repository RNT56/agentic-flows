spec_version: agentic-flows/v1
id: engineering.dead-code-retirement
version: 0.1.0
title: Dead code retirement
summary: Prove code is unused, remove it, and verify behavior is unchanged, or keep it with a justification.
stability: experimental
owners:
  - RNT56
tags:
  - engineering
  - cleanup
  - refactor
entrypoint: intake
runtime:
  supported_cores:
    - nilcore
    - standalone
  required_capabilities:
    - repo.checkout
    - code.search
    - patch.apply
    - command.run
    - evidence.capture
  adapter_hints:
    nilcore:
      execution_mode: sandboxed-worker
contracts:
  inputs:
    - id: target
      type: markdown
      required: true
      description: The suspected dead code to evaluate.
    - id: repo
      type: uri
      required: true
      description: Repository or local checkout target.
  outputs:
    - id: removal_patch
      type: patch
      required: true
      description: The removal patch, or a no-op with a justification when still referenced.
    - id: impact_report
      type: markdown
      required: true
      description: Reference search results, public API impact, and the test outcome.
  artifacts:
    - reference-search
    - removal-diff
    - test-log
nodes:
  - id: intake
    type: intake
    title: Intake retirement target
    description: Capture the suspected dead code and the repo target.
    instructions: Record the suspected dead code and the repo target so its references and public API exposure can be searched
      before any removal.
    inputs_schema:
      - id: target
        type: markdown
        required: true
        description: The suspected dead code to evaluate.
      - id: repo
        type: uri
        required: true
        description: Repository or local checkout target.
    produces:
      - retirement-scope
  - id: search
    type: tool
    title: Search references
    description: Search the codebase for references and public API exposure of the target.
    instructions: Search the tracked codebase for every reference to the target and any public API exposure, and capture the
      matches so the unused claim can be proven.
    command: git grep -n -- ${param.symbol}
    parameters:
      - id: symbol
        type: text
        required: false
        default: TODO-set-target-symbol
        description: The symbol or identifier to search for across the codebase.
    tool: code-search
    requires:
      - retirement-scope
    produces:
      - reference-search
    on_failure:
      action: abort
  - id: decide
    type: decision
    title: Unused or still referenced
    description: Decide whether the target is provably unused or must be kept.
    instructions: Decide from the reference search whether the target is provably unused, or record a justification for keeping
      it when references or public API exposure remain.
    requires:
      - reference-search
    produces:
      - retirement-decision
  - id: remove
    type: agent_task
    title: Remove the code
    description: Remove the confirmed-unused code in the smallest coherent change.
    instructions: Remove the confirmed-unused code in the smallest coherent change, touching only what the reference search
      proved dead. This step needs a coding agent supplied by the consumer.
    agent: coding-worker
    requires:
      - retirement-decision
    produces:
      - removal-diff
  - id: test
    type: tool
    title: Run checks
    description: Run the project tests to confirm behavior is unchanged after removal.
    instructions: Run the project tests after the removal and capture stdout, stderr, and the exit code to confirm behavior
      is unchanged.
    command: ${param.test_command}
    parameters:
      - id: test_command
        type: command
        required: false
        default: make test || npm test || cargo test || go test ./...
        description: The command that runs the project tests after the removal.
    tool: command-runner
    requires:
      - removal-diff
    produces:
      - test-log
    on_failure:
      action: abort
  - id: verify
    type: verifier
    title: Verify impact
    description: Confirm references were searched, public API impact assessed, and tests pass.
    instructions: Confirm the reference search covered usages and public API exposure, the impact was assessed, and the tests
      pass, then write the impact report.
    requires:
      - removal-diff
      - test-log
    produces:
      - impact-check
  - id: final
    type: finalizer
    title: Close out retirement
    description: Return the removal patch and an impact report.
    instructions: Return the removal patch, or a no-op with a justification when the target is still referenced, together
      with the impact report covering references, public API impact, and the test outcome.
    requires:
      - retirement-decision
      - impact-check
    produces:
      - removal_patch
      - impact_report
edges:
  - from: intake
    to: search
  - from: search
    to: decide
  - from: decide
    to: remove
    condition: confirmed-unused
  - from: decide
    to: final
    condition: still-referenced
  - from: remove
    to: test
  - from: test
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: references-searched
    title: References are searched
    type: artifact
    required: true
    evidence: The reference search covers usages and public API exposure of the target.
    evidence_refs:
      - reference-search
  - id: tests-pass
    title: Tests pass after removal
    type: command
    required: false
    command: make test || npm test || cargo test || go test ./...
    evidence: Project tests pass after the removal.
    evidence_refs:
      - test-log
observability:
  events:
    - flow.started
    - node.completed
    - decision.recorded
    - gate.completed
    - flow.completed
  metrics:
    - references.found
    - duration.seconds
