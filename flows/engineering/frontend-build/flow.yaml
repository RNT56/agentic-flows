spec_version: agentic-flows/v1.1
id: engineering.frontend-build
version: 0.1.0
title: Frontend build
summary: Build a frontend in a given stack with build, component-test, and accessibility evidence and an operator visual review.
stability: experimental
owners:
  - RNT56
tags:
  - engineering
  - frontend
  - ui
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - nilcore
    - standalone
  required_capabilities:
    - repo.checkout
    - patch.apply
    - command.run
    - evidence.capture
    - human.review
contracts:
  inputs:
    - id: design_spec
      type: markdown
      required: true
      description: 'Approved design spec: IA, component inventory, and acceptance criteria.'
    - id: stack
      type: text
      required: true
      description: Target stack identifier such as react, vue, or svelte; selects the build and test commands.
    - id: repo
      type: uri
      required: true
      description: Repository or local checkout target where the frontend is built.
  outputs:
    - id: frontend_patch
      type: patch
      required: true
      description: Source changes implementing the frontend against the design spec.
    - id: build_report
      type: markdown
      required: true
      description: Summary of build, component-test, and accessibility evidence and residual risk.
  artifacts:
    - build-plan
    - ui-diff
    - build-log
    - component-test-log
    - a11y-log
    - ui-verified
nodes:
  - id: intake
    type: intake
    title: Intake design spec
    description: Capture the design spec, stack, and repo target for the frontend build.
    produces:
      - scoped-ui
  - id: plan
    type: plan
    title: Plan the frontend
    description: Map components to the stack and select the build, test, and accessibility commands.
    requires:
      - scoped-ui
    produces:
      - build-plan
  - id: implement
    type: agent_task
    title: Implement the frontend
    description: Build the components and pages described by the design spec in the chosen stack.
    agent: frontend-worker
    requires:
      - build-plan
    produces:
      - ui-diff
    iteration:
      max_iterations: 3
      on_exhausted: fail
      until: gate:build-and-component-tests-pass
    policy:
      preserve_user_changes: true
  - id: build
    type: tool
    title: Build and typecheck
    description: Produce a production build and typecheck using the stack build command.
    tool: command-runner
    requires:
      - ui-diff
    produces:
      - build-log
  - id: test
    type: tool
    title: Run component tests and lint
    description: Run component tests and lint using the stack test command.
    tool: command-runner
    requires:
      - ui-diff
    produces:
      - component-test-log
  - id: accessibility
    type: tool
    title: Run accessibility checks
    description: Run static accessibility checks against the built components.
    tool: command-runner
    requires:
      - ui-diff
    produces:
      - a11y-log
  - id: verify
    type: verifier
    title: Verify build evidence
    description: Confirm build, component tests, and accessibility checks passed.
    requires:
      - build-log
      - component-test-log
      - a11y-log
    produces:
      - ui-verified
  - id: review
    type: approval
    title: Visual and UX review
    description: An operator reviews the rendered UI for visual and interaction quality.
    requires:
      - ui-verified
  - id: final
    type: finalizer
    title: Close out frontend
    description: Return the frontend patch and the build report.
    requires:
      - ui-verified
    produces:
      - frontend_patch
      - build_report
edges:
  - from: intake
    to: plan
  - from: plan
    to: implement
  - from: implement
    to: build
  - from: build
    to: test
  - from: test
    to: accessibility
  - from: accessibility
    to: verify
  - from: verify
    to: review
  - from: review
    to: final
quality_gates:
  - id: build-and-component-tests-pass
    title: Build and component tests pass
    type: command
    required: true
    command: npm run build && npm test || make build && make test
    evidence: Build and component-test output selected by the runtime for the chosen stack.
    evidence_refs:
      - component-test-log
    evidence_class: deterministic
  - id: accessibility-checked
    title: Accessibility checked
    type: artifact
    required: true
    evidence: Static accessibility checks ran and their findings are recorded.
    evidence_refs:
      - a11y-log
    evidence_class: deterministic
  - id: visual-ux-reviewed
    title: Visual and UX reviewed
    type: judgment
    required: true
    evidence: An operator reviewed the rendered UI for visual and interaction quality.
    evidence_refs:
      - ui-verified
    evidence_class: judgment
    criteria:
      - Layout matches the design spec
      - Interactions are responsive and accessible
      - No visual regressions versus the spec
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - duration.seconds
    - tests.executed
