spec_version: agentic-flows/v1
id: engineering.security-hotfix
version: 0.1.0
title: Security hotfix
summary: Patch a vulnerability with minimal blast radius, an exploitability assessment, and a drafted advisory.
stability: experimental
owners:
  - RNT56
tags:
  - engineering
  - security
  - hotfix
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - nilcore
    - crustcore
    - standalone
  required_capabilities:
    - repo.checkout
    - patch.apply
    - command.run
    - human.review
    - evidence.capture
  adapter_hints:
    crustcore:
      proof_surface: verified-patch
    nilcore:
      execution_mode: sandboxed-worker
    thinclaw:
      routine_type: operator-supervised
contracts:
  inputs:
    - id: vulnerability
      type: markdown
      required: true
      description: The vulnerability report and its source.
    - id: repo
      type: uri
      required: true
      description: Repository or local checkout target.
  outputs:
    - id: hotfix_patch
      type: patch
      required: true
      description: The minimal hotfix patch.
    - id: advisory
      type: markdown
      required: true
      description: The drafted release advisory.
  artifacts:
    - vuln-record
    - exploit-assessment
    - hotfix-diff
    - test-log
    - release-advisory
nodes:
  - id: intake
    type: intake
    title: Record vulnerability
    description: Capture the vulnerability report and its source.
    produces:
      - vuln-record
  - id: assess
    type: agent_task
    title: Assess exploitability
    description: Assess exploitability and the minimal blast radius for a fix.
    agent: security-analyst
    requires:
      - vuln-record
    produces:
      - exploit-assessment
  - id: patch
    type: agent_task
    title: Apply minimal hotfix
    description: Apply the smallest patch that closes the vulnerability.
    agent: coding-worker
    requires:
      - exploit-assessment
    produces:
      - hotfix-diff
  - id: test
    type: tool
    title: Run checks
    description: Run the tests and any security checks against the hotfix.
    tool: command-runner
    requires:
      - hotfix-diff
    produces:
      - test-log
  - id: verify
    type: verifier
    title: Verify and draft advisory
    description: Confirm the fix passes and draft a release advisory.
    requires:
      - hotfix-diff
      - test-log
    produces:
      - release-advisory
  - id: approval
    type: approval
    title: Approve release
    description: Require operator approval before releasing the hotfix and advisory.
    requires:
      - release-advisory
    produces:
      - approval-record
    policy:
      human_required_when:
        - security_release
  - id: final
    type: finalizer
    title: Close out hotfix
    description: Return the hotfix patch and the advisory.
    requires:
      - release-advisory
    produces:
      - hotfix_patch
      - advisory
edges:
  - from: intake
    to: assess
  - from: assess
    to: patch
  - from: patch
    to: test
  - from: test
    to: verify
  - from: verify
    to: approval
    condition: release-required
  - from: verify
    to: final
    condition: no-release-needed
  - from: approval
    to: final
quality_gates:
  - id: vuln-source-captured
    title: Vulnerability source captured
    type: artifact
    required: true
    evidence: The vulnerability record captures the source of the report.
    evidence_refs:
      - vuln-record
  - id: exploitability-assessed
    title: Exploitability assessment present
    type: review
    required: true
    evidence: The assessment records exploitability and blast radius.
    evidence_refs:
      - exploit-assessment
  - id: verifier-evidence-passes
    title: Verifier evidence passes
    type: command
    required: true
    command: make test || npm test || pytest -q
    evidence: The hotfix passes the tests and security checks.
    evidence_refs:
      - test-log
observability:
  events:
    - flow.started
    - node.completed
    - decision.recorded
    - approval.requested
    - approval.completed
    - gate.completed
    - flow.completed
  metrics:
    - blast.radius
    - duration.seconds
