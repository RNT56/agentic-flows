spec_version: agentic-flows/v1.1
id: engineering.performance-regression
version: 0.1.0
title: Performance regression
summary: Measure, isolate, and fix a performance regression with a recorded method and before/after numbers.
stability: experimental
owners:
  - RNT56
tags:
  - engineering
  - performance
  - regression
entrypoint: intake
runtime:
  supported_cores:
    - nilcore
    - crustcore
    - standalone
  required_capabilities:
    - repo.checkout
    - command.run
    - patch.apply
    - evidence.capture
  adapter_hints:
    crustcore:
      proof_surface: verified-patch
    nilcore:
      execution_mode: sandboxed-worker
contracts:
  inputs:
    - id: regression_report
      type: markdown
      required: true
      description: The reported slowdown and how it was noticed.
    - id: repo
      type: uri
      required: true
      description: Repository or local checkout target.
  outputs:
    - id: fix_patch
      type: patch
      required: true
      description: The performance fix.
    - id: benchmark_report
      type: markdown
      required: true
      description: Method, variance bounds, and before/after numbers.
  artifacts:
    - benchmark-method
    - baseline-numbers
    - fix-diff
    - after-numbers
nodes:
  - id: intake
    type: intake
    title: Intake regression
    description: Capture the reported slowdown and the repo target.
    instructions: Record the reported slowdown, how it was noticed, and the repo target so the benchmark can reproduce the
      regression on a known baseline.
    inputs_schema:
      - id: regression_report
        type: markdown
        required: true
        description: The reported slowdown and how it was noticed.
      - id: repo
        type: uri
        required: true
        description: The repository or checkout that exhibits the regression.
    produces:
      - regression-scope
  - id: measure
    type: tool
    title: Measure baseline
    description: Record the benchmark method and the baseline numbers with bounded variance.
    instructions: Run the benchmark on the current code, capturing the method and environment along with the baseline numbers,
      and repeat enough times to bound the variance.
    command: ${param.bench_command}
    parameters:
      - id: bench_command
        type: command
        required: false
        default: python -m pytest --benchmark-only -q
        description: The command that runs the benchmark and prints timing numbers.
    tool: benchmark-runner
    requires:
      - regression-scope
    produces:
      - benchmark-method
      - baseline-numbers
    environment:
      ephemeral: true
      provides:
        - ephemeral-bench-host
      teardown_required: true
    on_failure:
      action: retry
      max_attempts: 2
  - id: fix
    type: agent_task
    title: Isolate and fix
    description: Isolate the cause and apply a fix.
    instructions: Isolate the cause of the slowdown using the baseline numbers and apply a targeted fix that addresses it
      without regressing behavior. This step needs a coding agent supplied by the consumer.
    agent: coding-worker
    requires:
      - baseline-numbers
    produces:
      - fix-diff
  - id: remeasure
    type: tool
    title: Measure after
    description: Re-run the same benchmark and record the after numbers.
    instructions: Re-run the identical benchmark on the fixed code with the same method and environment, and record the after
      numbers so they can be compared like-for-like against the baseline.
    command: ${param.bench_command}
    parameters:
      - id: bench_command
        type: command
        required: false
        default: python -m pytest --benchmark-only -q
        description: The same benchmark command used for the baseline, re-run after the fix.
    tool: benchmark-runner
    requires:
      - fix-diff
    produces:
      - after-numbers
    iteration:
      max_iterations: 3
      on_exhausted: fail
      until: gate:before-after-bounded
    on_failure:
      action: retry
      max_attempts: 2
  - id: verify
    type: verifier
    title: Verify improvement
    description: Confirm the method is recorded, variance is bounded, and the after numbers improve.
    instructions: Confirm the benchmark method and environment are recorded, the variance is bounded, and the after numbers
      show a real improvement over the baseline.
    requires:
      - baseline-numbers
      - after-numbers
    produces:
      - perf-check
  - id: final
    type: finalizer
    title: Close out regression
    description: Return the fix and the benchmark report.
    instructions: Return the fix patch and a benchmark report stating the method, the variance bounds, and the before and
      after numbers.
    requires:
      - perf-check
      - after-numbers
    produces:
      - fix_patch
      - benchmark_report
edges:
  - from: intake
    to: measure
  - from: measure
    to: fix
  - from: fix
    to: remeasure
  - from: remeasure
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: benchmark-method-recorded
    title: Benchmark method recorded
    type: artifact
    required: true
    evidence: The benchmark method and environment are recorded.
    evidence_refs:
      - benchmark-method
  - id: before-after-bounded
    title: Before/after numbers with bounded variance
    type: review
    required: true
    evidence: Before and after numbers are reported with bounded variance.
    evidence_refs:
      - after-numbers
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - speedup.ratio
    - duration.seconds
