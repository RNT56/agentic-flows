spec_version: agentic-flows/v1
id: engineering.docs-from-diff
version: 0.1.0
title: Docs from diff
summary: Detect when a code change requires docs, examples, or changelog updates and make or justify them.
stability: experimental
owners:
  - RNT56
tags:
  - engineering
  - docs
  - changelog
entrypoint: intake
runtime:
  supported_cores:
    - nilcore
    - standalone
  required_capabilities:
    - diff.read
    - docs.read
    - evidence.capture
  adapter_hints:
    nilcore:
      execution_mode: sandboxed-worker
contracts:
  inputs:
    - id: diff
      type: patch
      required: true
      description: The code change to assess for documentation impact.
    - id: docs_root
      type: uri
      required: true
      description: The documentation root to update.
  outputs:
    - id: docs_decision
      type: json
      required: true
      description: Whether docs are impacted and which docs are affected.
    - id: docs_patch
      type: patch
      required: true
      description: The documentation updates, or an explicit none with justification.
  artifacts:
    - impact-analysis
    - docs-decision
    - docs-diff
nodes:
  - id: intake
    type: intake
    title: Intake the diff
    description: Capture the code change and the documentation root.
    instructions: Record the code change to assess and the documentation root to update so the diff can be examined for documentation
      impact.
    inputs_schema:
      - id: diff
        type: patch
        required: true
        description: The code change to assess for documentation impact.
      - id: docs_root
        type: uri
        required: true
        description: The documentation root to update.
    produces:
      - diff-context
  - id: analyze
    type: agent_task
    title: Analyze docs impact
    description: Determine whether the change touches documented behavior, examples, or the changelog.
    instructions: Examine the diff and determine whether it touches documented behavior, examples, or the changelog, naming
      the specific docs affected. This step needs a docs analyst supplied by the consumer.
    agent: docs-analyst
    requires:
      - diff-context
    produces:
      - impact-analysis
  - id: decide
    type: decision
    title: Docs needed or not
    description: Decide explicitly whether documentation updates are required.
    instructions: Decide explicitly whether documentation updates are required, recording which docs are affected or an explicit
      non-impact with justification.
    requires:
      - impact-analysis
    produces:
      - docs-decision
  - id: update
    type: agent_task
    title: Update docs
    description: Apply the documentation, example, or changelog updates.
    instructions: Apply the documentation, example, or changelog updates the decision calls for, keeping them consistent with
      the code change. This step needs a docs-writing agent supplied by the consumer.
    agent: docs-writer
    requires:
      - docs-decision
    produces:
      - docs-diff
  - id: verify
    type: verifier
    title: Verify docs decision
    description: Confirm the docs-impact decision is explicit and updates were made or non-impact justified.
    instructions: Confirm the docs-impact decision is explicit and that the affected docs were updated or the non-impact was
      justified.
    requires:
      - docs-decision
    produces:
      - docs-check
  - id: final
    type: finalizer
    title: Close out docs impact
    description: Return the docs decision and the documentation patch.
    instructions: Return the docs decision stating whether docs are impacted and which are affected, along with the documentation
      patch or an explicit none with justification.
    requires:
      - docs-decision
      - docs-check
    produces:
      - docs_decision
      - docs_patch
edges:
  - from: intake
    to: analyze
  - from: analyze
    to: decide
  - from: decide
    to: update
    condition: docs-needed
  - from: decide
    to: final
    condition: no-impact
  - from: update
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: docs-impact-explicit
    title: Docs-impact decision is explicit
    type: review
    required: true
    evidence: The decision states whether docs are impacted and which docs are affected.
    evidence_refs:
      - docs-decision
  - id: docs-updated-or-justified
    title: Docs updated or non-impact justified
    type: review
    required: false
    evidence: Affected docs are updated, or a non-impact is explicitly justified.
    evidence_refs:
      - docs-diff
observability:
  events:
    - flow.started
    - node.completed
    - decision.recorded
    - gate.completed
    - flow.completed
  metrics:
    - docs.touched
    - duration.seconds
