spec_version: agentic-flows/v1
id: engineering.monorepo-slice-execution
version: 0.1.0
title: Monorepo slice execution
summary: Claim and execute a non-overlapping slice in a large repo with active parallel agents, reporting conflicts.
stability: experimental
owners:
  - RNT56
tags:
  - engineering
  - monorepo
  - coordination
entrypoint: intake
runtime:
  supported_cores:
    - nilcore
    - thinclaw
    - standalone
  required_capabilities:
    - repo.checkout
    - claim.register
    - command.run
    - evidence.capture
  adapter_hints:
    nilcore:
      execution_mode: sandboxed-worker
    thinclaw:
      routine_type: shared-claim-board
contracts:
  inputs:
    - id: slice
      type: markdown
      required: true
      description: The slice of work to execute.
    - id: active_claims
      type: json
      required: true
      description: Active claims from other agents to avoid overlapping.
  outputs:
    - id: slice_patch
      type: patch
      required: true
      description: The change scoped to the claimed slice.
    - id: conflict_report
      type: markdown
      required: true
      description: Any conflicts found against active claims.
  artifacts:
    - claim-record
    - slice-diff
    - test-log
nodes:
  - id: intake
    type: intake
    title: Intake slice
    description: Capture the slice of work and the active claims.
    instructions: Record the slice of work to execute and the active claims from other agents so the slice can be claimed
      without overlapping paths already in progress.
    inputs_schema:
      - id: slice
        type: markdown
        required: true
        description: The slice of work to execute.
      - id: active_claims
        type: json
        required: true
        description: Active claims from other agents to avoid overlapping.
    produces:
      - slice-scope
  - id: claim
    type: agent_task
    title: Claim the slice
    description: Register a claim for the slice only if its paths do not overlap active claims.
    instructions: Compare the slice paths against the active claims and register a claim only if there is no overlap, recording
      which claims were checked. This step needs a claim-coordination agent supplied by the consumer.
    agent: claim-coordinator
    requires:
      - slice-scope
    produces:
      - claim-record
  - id: execute
    type: agent_task
    title: Execute the slice
    description: Apply changes scoped strictly to the claimed paths.
    instructions: Apply the change scoped strictly to the claimed paths, touching nothing outside the claim so parallel agents
      stay non-overlapping. This step needs a coding agent supplied by the consumer.
    agent: coding-worker
    requires:
      - claim-record
    produces:
      - slice-diff
  - id: test
    type: tool
    title: Run checks
    description: Run the tests for the touched paths.
    instructions: Run the project tests for the touched paths and capture stdout, stderr, and the exit code as evidence the
      slice change is sound.
    command: ${param.test_command}
    parameters:
      - id: test_command
        type: command
        required: false
        default: make test || npm test || pytest -q
        description: The command that runs the tests covering the touched paths.
    tool: command-runner
    requires:
      - slice-diff
    produces:
      - test-log
    on_failure:
      action: abort
  - id: verify
    type: verifier
    title: Verify scope and conflicts
    description: Confirm the change stays within claimed paths and report any conflicts.
    instructions: Confirm the diff stays within the claimed paths and report any conflicts found against the active claims,
      with the conflicting paths named.
    requires:
      - slice-diff
      - test-log
    produces:
      - conflict-check
  - id: final
    type: finalizer
    title: Close out slice
    description: Return the slice patch and the conflict report.
    instructions: Return the slice patch scoped to the claimed paths and a conflict report listing any overlaps found against
      active claims.
    requires:
      - claim-record
      - conflict-check
    produces:
      - slice_patch
      - conflict_report
edges:
  - from: intake
    to: claim
  - from: claim
    to: execute
  - from: execute
    to: test
  - from: test
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: claim-checked
    title: Active claims checked before execution
    type: artifact
    required: true
    evidence: The claim record shows active claims were checked and paths do not overlap.
    evidence_refs:
      - claim-record
  - id: scope-and-conflicts-clear
    title: Touched paths scoped and conflicts reported
    type: command
    required: true
    command: make test || npm test || pytest -q
    evidence: Tests pass for the touched paths and conflicts are reported.
    evidence_refs:
      - test-log
observability:
  events:
    - flow.started
    - node.completed
    - claim.registered
    - gate.completed
    - flow.completed
  metrics:
    - touched.paths
    - duration.seconds
