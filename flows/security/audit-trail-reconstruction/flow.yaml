spec_version: agentic-flows/v1
id: security.audit-trail-reconstruction
version: 0.1.0
title: Audit trail reconstruction
summary: Reconstruct what happened in a run from logs, events, approvals, and artifacts, marking gaps explicitly.
stability: experimental
owners:
  - RNT56
tags:
  - security
  - audit
  - forensics
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - crustcore
    - standalone
  required_capabilities:
    - run.read
    - evidence.capture
  adapter_hints:
    crustcore:
      proof_surface: audit-evidence
    thinclaw:
      routine_type: operator-supervised
contracts:
  inputs:
    - id: run_sources
      type: json
      required: true
      description: Logs, events, approvals, and artifact references to reconstruct from.
    - id: incident
      type: markdown
      required: true
      description: What is being reconstructed and why.
  outputs:
    - id: audit_trail
      type: markdown
      required: true
      description: A source-backed timeline of what happened.
    - id: gaps
      type: json
      required: true
      description: The explicit gaps where evidence is missing.
  artifacts:
    - source-index
    - reconstructed-timeline
    - gap-list
nodes:
  - id: intake
    type: intake
    title: Intake sources
    description: Capture the available sources and what must be reconstructed.
    instructions: Record the run_sources references and the incident being reconstructed so later steps know exactly which
      logs, events, approvals, and artifacts are in scope. Done when the sources and the reconstruction goal are captured.
    inputs_schema:
      - id: run_sources
        type: json
        required: true
        description: Logs, events, approvals, and artifact references to reconstruct from.
      - id: incident
        type: markdown
        required: true
        description: What is being reconstructed and why.
    produces:
      - audit-scope
  - id: collect
    type: tool
    title: Index sources
    description: Index the logs, events, approvals, and artifacts into a single ordered set.
    instructions: Pull every referenced log, event, approval, and artifact into one chronologically ordered index, noting
      each entry's origin and timestamp. Capture the indexed set as evidence; done when all sources are indexed with their
      provenance preserved.
    tool: evidence-indexer
    requires:
      - audit-scope
    produces:
      - source-index
  - id: reconstruct
    type: agent_task
    title: Reconstruct timeline
    description: Build the timeline strictly from sources, never inferring claims as facts.
    instructions: Build the timeline strictly from the indexed sources, citing the source for every entry and never stating
      an inference as a fact. This step needs a forensic analyst supplied by the consumer; done when each event is placed
      in order with its citation.
    agent: forensic-analyst
    requires:
      - source-index
    produces:
      - reconstructed-timeline
  - id: verify
    type: verifier
    title: Verify and mark gaps
    description: Confirm each entry is source-backed and mark the gaps where evidence is missing.
    instructions: Check that every timeline entry cites a real source and record an explicit gap wherever evidence is missing
      or ambiguous. Done when each entry is confirmed source-backed and the gap list enumerates the missing evidence.
    requires:
      - reconstructed-timeline
    produces:
      - gap-list
    on_failure:
      action: abort
  - id: final
    type: finalizer
    title: Close out reconstruction
    description: Return the audit trail and the explicit gaps.
    instructions: Return the source-backed audit trail and the explicit gap list so the consumer knows both what happened
      and where evidence is missing. Done when both outputs are produced.
    requires:
      - reconstructed-timeline
      - gap-list
    produces:
      - audit_trail
      - gaps
edges:
  - from: intake
    to: collect
  - from: collect
    to: reconstruct
  - from: reconstruct
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: timeline-source-backed
    title: Timeline entries are source-backed
    type: review
    required: true
    evidence: Every timeline entry cites a source and inferences are not stated as facts.
    evidence_refs:
      - reconstructed-timeline
  - id: gaps-marked
    title: Evidence gaps are marked
    type: artifact
    required: true
    evidence: The gap list records where evidence is missing.
    evidence_refs:
      - gap-list
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - sources.indexed
    - duration.seconds
