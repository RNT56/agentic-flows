spec_version: agentic-flows/v1
id: security.access-review
version: 0.1.0
title: Access review
summary: Review user, connector, repo, and deployment permissions so each has an owner and reason, tracking removals.
stability: experimental
owners:
  - RNT56
tags:
  - security
  - access
  - review
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - standalone
  required_capabilities:
    - grant.read
    - decision.record
    - evidence.capture
  adapter_hints:
    thinclaw:
      routine_type: operator-supervised
contracts:
  inputs:
    - id: access_inventory
      type: json
      required: true
      description: The current grants across users, connectors, repos, and deployments.
    - id: policy
      type: markdown
      required: true
      description: The least-privilege and review policy.
  outputs:
    - id: review_decisions
      type: json
      required: true
      description: Keep, remove, or flag per grant, with owner and reason.
    - id: review_report
      type: markdown
      required: true
      description: A readable summary of the review.
  artifacts:
    - permission-inventory
    - review-decisions
nodes:
  - id: intake
    type: intake
    title: Intake access
    description: Capture the access inventory and the review policy.
    instructions: Load the full access inventory across users, connectors, repos, and deployments and record the least-privilege
      and review policy that each grant will be judged against.
    inputs_schema:
      - id: access_inventory
        type: json
        required: true
        description: The current grants across users, connectors, repos, and deployments.
      - id: policy
        type: markdown
        required: true
        description: The least-privilege and review policy.
    produces:
      - review-scope
  - id: inventory
    type: agent_task
    title: Normalize inventory
    description: Normalize each grant and attach its current owner and reason.
    instructions: Normalize every grant into a consistent record and attach its current owner and the stated reason it exists,
      flagging any grant with no identifiable owner or reason. This step needs a security analyst supplied by the consumer.
    agent: security-analyst
    requires:
      - review-scope
    produces:
      - permission-inventory
  - id: review
    type: agent_task
    title: Review grants
    description: Decide keep, remove, or flag for each grant against the policy.
    instructions: Decide keep, remove, or flag for each grant by testing it against the least-privilege policy, and record
      the rationale and any approved exception for each decision. This step needs a security analyst supplied by the consumer.
    agent: security-analyst
    requires:
      - permission-inventory
    produces:
      - review-decisions
  - id: verify
    type: verifier
    title: Verify review
    description: Confirm every grant has an owner and reason and removals are tracked.
    instructions: Confirm every grant carries an owner and a reason and that each remove or flag decision is tracked with
      its rationale, flagging any grant left undecided.
    requires:
      - review-decisions
    produces:
      - review-check
  - id: final
    type: finalizer
    title: Close out review
    description: Return the review decisions and the report.
    instructions: Return the per-grant keep, remove, or flag decisions with owner and reason and a readable report summarizing
      the removals, exceptions, and residual risk.
    requires:
      - review-decisions
      - review-check
    produces:
      - review_decisions
      - review_report
edges:
  - from: intake
    to: inventory
  - from: inventory
    to: review
  - from: review
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: permissions-have-owner-and-reason
    title: Every permission has owner and reason
    type: artifact
    required: true
    evidence: The inventory records an owner and reason for each grant.
    evidence_refs:
      - permission-inventory
  - id: removals-tracked
    title: Removals and exceptions tracked
    type: review
    required: true
    evidence: The decisions track each removal and exception.
    evidence_refs:
      - review-decisions
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - grants.reviewed
    - duration.seconds
