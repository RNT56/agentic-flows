spec_version: agentic-flows/v1
id: ops.adapter-certification
version: 0.1.0
title: Adapter certification
summary: Generate adapter smoke evidence for a consumer and a flow, including a negative fixture that must fail.
stability: experimental
owners:
  - RNT56
tags:
  - ops
  - adapter
  - certification
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - nilcore
    - crustcore
    - standalone
  required_capabilities:
    - flow.load
    - capability.introspect
    - run.validate
    - evidence.capture
  adapter_hints:
    crustcore:
      proof_surface: adapter-evidence
    nilcore:
      execution_mode: sandboxed-worker
contracts:
  inputs:
    - id: consumer
      type: text
      required: true
      description: The optional consumer to certify against the flow.
    - id: flow
      type: uri
      required: true
      description: The flow definition to certify.
  outputs:
    - id: adapter_smoke
      type: json
      required: true
      description: The adapter smoke manifest produced for the consumer and flow.
    - id: certification_report
      type: markdown
      required: true
      description: Pass or fail summary including the negative-fixture result.
  artifacts:
    - loader-output
    - adapter-smoke-log
    - adapter-smoke-manifest
nodes:
  - id: intake
    type: intake
    title: Intake consumer and flow
    description: Capture the consumer and the flow to certify and the expected capability set.
    instructions: Record the consumer and the flow to certify along with the capability set expected to be exercised so the
      smoke run can target the right pairing.
    inputs_schema:
      - id: consumer
        type: text
        required: true
        description: The optional consumer to certify against the flow.
      - id: flow
        type: uri
        required: true
        description: The flow definition to certify.
    produces:
      - certification-request
  - id: certify
    type: tool
    title: Run loader and checks
    description: Load the flow, check capability support, and validate the produced run bundle.
    instructions: Run the adapter smoke check over the flow, confirming the flow loads, capabilities are supported, node mappings
      resolve, and the run bundle validates, capturing the full log.
    command: flowctl validate-adapter-smoke ${param.smoke_manifest}
    parameters:
      - id: smoke_manifest
        type: uri
        required: false
        default: .
        description: The adapter smoke manifest path or directory to validate for the consumer and flow.
    tool: flowctl
    requires:
      - certification-request
    produces:
      - loader-output
      - adapter-smoke-log
    on_failure:
      action: abort
  - id: verify
    type: verifier
    title: Confirm evidence and negative fixture
    description: Confirm the manifest validates and the negative fixture fails with the expected error.
    instructions: Confirm the smoke log shows the manifest validating and the declared negative fixture failing with its expected
      error, then assemble the certified manifest.
    requires:
      - loader-output
      - adapter-smoke-log
    produces:
      - adapter-smoke-manifest
  - id: final
    type: finalizer
    title: Close out certification
    description: Return the adapter smoke manifest and a certification report.
    instructions: Return the adapter smoke manifest and a certification report that summarizes pass or fail including the
      negative-fixture result.
    requires:
      - adapter-smoke-manifest
    produces:
      - adapter_smoke
      - certification_report
edges:
  - from: intake
    to: certify
  - from: certify
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: adapter-smoke-validates
    title: Adapter smoke validates
    type: command
    required: true
    command: flowctl validate-adapter-smoke
    evidence: Validation log showing the manifest, capabilities, node mappings, and run bundle validate.
    evidence_refs:
      - adapter-smoke-log
  - id: negative-fixture-fails
    title: Negative fixture fails as expected
    type: policy
    required: false
    evidence: The negative run fixture fails validation with the declared expected error.
    evidence_refs:
      - adapter-smoke-log
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - capabilities.checked
    - duration.seconds
