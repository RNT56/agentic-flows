spec_version: agentic-flows/v1.1
id: ops.scheduler-health
version: 0.1.0
title: Scheduler health
summary: Inspect recurring automations, cron jobs, reminders, and monitors for failures or drift, with remediation approved
  before changes.
stability: experimental
owners:
  - RNT56
tags:
  - ops
  - scheduler
  - health
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - nilcore
  required_capabilities:
    - scheduler.read
    - evidence.capture
    - human.review
contracts:
  inputs:
    - id: schedulers
      type: markdown
      required: true
      description: The recurring automations and monitors in scope.
    - id: window
      type: text
      required: true
      description: The lookback window.
  outputs:
    - id: health_report
      type: markdown
      required: true
      description: The stale or failed schedules and proposed remediation.
    - id: remediation
      type: json
      required: true
      description: The remediation awaiting approval.
  artifacts:
    - scheduler-health-plan
    - scheduler-health-evidence
    - scheduler-health-analysis
    - scheduler-health-record
nodes:
  - id: intake
    type: intake
    title: Intake scope
    description: Capture the scope and sources for scheduler health.
    produces:
      - scope
  - id: plan
    type: plan
    title: Plan the work
    description: Plan which sources to read and how to attribute the result.
    requires:
      - scope
    produces:
      - scheduler-health-plan
  - id: gather
    type: agent_task
    title: Read scheduler state
    description: Read the live state and recent runs of the recurring automations.
    agent: scheduler-worker
    requires:
      - scheduler-health-plan
    produces:
      - scheduler-health-evidence
  - id: analyze
    type: agent_task
    title: Surface failures and drift
    description: Surface stale or failed schedules and any drift from intended cadence.
    agent: scheduler-worker
    requires:
      - scheduler-health-evidence
    produces:
      - scheduler-health-analysis
  - id: produce
    type: agent_task
    title: Propose remediation
    description: Assemble the health report and propose remediation awaiting approval.
    agent: scheduler-worker
    requires:
      - scheduler-health-analysis
    produces:
      - scheduler-health-record
  - id: review
    type: approval
    title: Review decision
    description: An accountable reviewer signs off before closeout.
    requires:
      - scheduler-health-record
  - id: final
    type: finalizer
    title: Close out
    description: Return the analysis and the decision record.
    requires:
      - scheduler-health-analysis
      - scheduler-health-record
    produces:
      - health_report
      - remediation
edges:
  - from: intake
    to: plan
  - from: plan
    to: gather
  - from: gather
    to: analyze
  - from: analyze
    to: produce
  - from: produce
    to: review
  - from: review
    to: final
quality_gates:
  - id: failures-source-backed
    title: Failures cite live run data
    type: artifact
    required: true
    evidence: Each surfaced failure or drift cites the live scheduler run it reflects.
    evidence_refs:
      - scheduler-health-evidence
    evidence_class: external-production
  - id: remediation-approved-before-change
    title: Remediation approved before changes
    type: judgment
    required: true
    evidence: No scheduler change is made without approval.
    evidence_refs:
      - scheduler-health-record
    evidence_class: judgment
    criteria:
      - Stale or failed schedules are surfaced with source refs
      - No schedule change is made without approval
      - Drift is distinguished from a one-off failure
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - duration.seconds
