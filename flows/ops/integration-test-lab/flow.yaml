spec_version: agentic-flows/v1.1
id: ops.integration-test-lab
version: 0.1.0
title: Integration test lab
summary: Run a service's integration suite against a runtime-provisioned ephemeral stack and record sandbox-run evidence with
  provisioning provenance.
stability: experimental
owners:
  - RNT56
tags:
  - ops
  - integration
  - testing
entrypoint: intake
runtime:
  supported_cores:
    - nilcore
  required_capabilities:
    - repo.checkout
    - command.run
    - ephemeral-datastore
    - evidence.capture
contracts:
  inputs:
    - id: service_ref
      type: uri
      required: true
      description: The service under test and its integration suite location.
    - id: repo
      type: uri
      required: true
      description: Repository or checkout the suite runs from.
  outputs:
    - id: integration_report
      type: markdown
      required: true
      description: Integration suite result, environment id, and residual risk.
  artifacts:
    - lab-plan
    - provision-record
    - integration-log
parameters:
  - id: integration_test_command
    type: text
    required: true
    description: Command that runs the integration suite against the provisioned stack.
  - id: datastore_image
    type: text
    required: true
    description: Image or descriptor for the ephemeral datastore the lab provisions.
nodes:
  - id: intake
    type: intake
    title: Intake lab scope
    description: Capture the service, suite, and the dependent stack the lab must provision.
    produces:
      - lab-scope
  - id: plan
    type: plan
    title: Plan the test lab
    description: Plan the ephemeral stack, the suite command, and the evidence to capture.
    requires:
      - lab-scope
    produces:
      - lab-plan
  - id: provision
    type: tool
    title: Provision the ephemeral stack
    description: Stand up an ephemeral datastore and dependent services for the suite.
    tool: command-runner
    requires:
      - lab-plan
    produces:
      - provision-record
    environment:
      ephemeral: true
      provides:
        - ephemeral-datastore
        - dev-server
      teardown_required: true
  - id: test
    type: tool
    title: Run the integration suite
    description: Run the integration and contract suite against the provisioned stack.
    tool: command-runner
    requires:
      - provision-record
    produces:
      - integration-log
  - id: verify
    type: verifier
    title: Verify suite results
    description: Confirm the integration suite passed and the provisioning provenance is recorded.
    requires:
      - integration-log
    produces:
      - lab-verification
  - id: final
    type: finalizer
    title: Close out the lab
    description: Return the integration report after the ephemeral stack is torn down.
    requires:
      - lab-verification
    produces:
      - integration_report
edges:
  - from: intake
    to: plan
  - from: plan
    to: provision
  - from: provision
    to: test
  - from: test
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: integration-suite-passed
    title: Integration suite passes
    type: command
    required: true
    command: '{{param.integration_test_command}}'
    evidence: Integration suite output against the provisioned stack.
    evidence_refs:
      - integration-log
    evidence_class: sandbox-run
  - id: env-provenance-recorded
    title: Provisioning provenance recorded
    type: artifact
    required: true
    evidence: The provisioning record links the env.provisioned and env.torn_down events.
    evidence_refs:
      - provision-record
    evidence_class: deterministic
observability:
  events:
    - flow.started
    - node.completed
    - env.provisioned
    - env.torn_down
    - gate.completed
    - flow.completed
  metrics:
    - duration.seconds
    - tests.executed
