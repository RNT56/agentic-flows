spec_version: agentic-flows/v1
id: proof.release-candidate-audit
version: 0.1.0
title: Release candidate audit
summary: Audit a release candidate against tests, changelog, tags, and docs, confirming reproducible artifacts.
stability: experimental
owners:
  - RNT56
tags:
  - proof
  - release
  - audit
entrypoint: intake
runtime:
  supported_cores:
    - nilcore
    - crustcore
    - standalone
  required_capabilities:
    - repo.checkout
    - command.run
    - evidence.capture
  adapter_hints:
    crustcore:
      proof_surface: release-audit
    nilcore:
      execution_mode: sandboxed-worker
contracts:
  inputs:
    - id: candidate
      type: text
      required: true
      description: The release candidate tag or commit.
    - id: repo
      type: uri
      required: true
      description: Repository or local checkout target.
  outputs:
    - id: audit_verdict
      type: json
      required: true
      description: Pass or fail with the checked criteria.
    - id: audit_report
      type: markdown
      required: true
      description: The audit findings across tests, changelog, tags, and docs.
  artifacts:
    - check-log
    - audit-findings
nodes:
  - id: intake
    type: intake
    title: Intake candidate
    description: Capture the release candidate and the repo target.
    instructions: Record the release candidate tag or commit and the repo target, so the release checks and the artifact audit
      run against the exact commit being released.
    inputs_schema:
      - id: candidate
        type: text
        required: true
        description: The release candidate tag or commit.
      - id: repo
        type: uri
        required: true
        description: Repository or local checkout target.
    produces:
      - audit-scope
  - id: checks
    type: tool
    title: Run release checks
    description: Run tests and the release checks against the candidate.
    instructions: Run the release checks and tests against the candidate commit and capture stdout, stderr, and the exit code
      as the evidence the audit verdict relies on.
    command: ${param.release_check_command}
    parameters:
      - id: release_check_command
        type: command
        required: false
        default: flowctl release-check || make release-check || make test || npm test || pytest -q
        description: The command that runs the release checks and tests for the candidate.
    tool: command-runner
    requires:
      - audit-scope
    produces:
      - check-log
    on_failure:
      action: abort
  - id: audit
    type: agent_task
    title: Audit artifacts
    description: Confirm the tag points at the audited commit, the changelog section exists, and docs match.
    instructions: Confirm the tag points at the audited commit, the changelog has a section for this release, and the docs
      match the shipped behavior, recording each finding with the artifact it came from. This step needs a release-audit agent
      supplied by the consumer.
    agent: release-auditor
    requires:
      - check-log
    produces:
      - audit-findings
  - id: verify
    type: verifier
    title: Verify reproducibility
    description: Confirm release checks pass, the changelog section exists, and artifacts are reproducible.
    instructions: Confirm the release checks passed, the changelog section exists, and the artifacts are reproducible from
      the audited commit, then record a pass or fail verdict with the criteria checked.
    requires:
      - check-log
      - audit-findings
    produces:
      - audit-verdict
    on_failure:
      action: abort
  - id: final
    type: finalizer
    title: Close out audit
    description: Return the audit verdict and the report.
    instructions: Return the pass or fail audit verdict with the checked criteria and the audit report covering tests, changelog,
      tags, and docs.
    requires:
      - audit-verdict
      - audit-findings
    produces:
      - audit_verdict
      - audit_report
edges:
  - from: intake
    to: checks
  - from: checks
    to: audit
  - from: audit
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: release-checks-pass
    title: Release checks pass
    type: command
    required: true
    command: flowctl release-check || make release-check
    evidence: The release checks pass for the candidate.
    evidence_refs:
      - check-log
  - id: changelog-and-tag-audited
    title: Changelog section exists and tag is audited
    type: review
    required: true
    evidence: The findings confirm the changelog section exists and the tag points at the audited commit.
    evidence_refs:
      - audit-findings
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - checks.run
    - duration.seconds
