spec_version: agentic-flows/v1
id: orchestration.self-improvement-loop
version: 0.1.0
title: Self improvement loop
summary: Identify repeated failures and propose a tested, reversible improvement to prompts, tools, or workflows.
stability: experimental
owners:
  - RNT56
tags:
  - orchestration
  - improvement
  - reliability
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - nilcore
    - crustcore
    - standalone
  required_capabilities:
    - failure.read
    - command.run
    - evidence.capture
  adapter_hints:
    crustcore:
      proof_surface: verified-patch
    nilcore:
      execution_mode: sandboxed-worker
contracts:
  inputs:
    - id: failure_history
      type: markdown
      required: true
      description: The recorded failures to learn from.
    - id: target
      type: markdown
      required: true
      description: The prompt, tool, skill, or workflow to improve.
  outputs:
    - id: improvement
      type: json
      required: true
      description: The proposed improvement and the pattern it addresses.
    - id: rollout_plan
      type: markdown
      required: true
      description: A reversible rollout plan.
  artifacts:
    - pattern-evidence
    - improvement-test
    - rollout-plan
nodes:
  - id: intake
    type: intake
    title: Intake failures
    description: Capture the failure history and the improvement target.
    instructions: Record the recorded failure history to learn from and the prompt, tool, skill, or workflow that is the improvement
      target. Done when the failure history and the target are both captured.
    inputs_schema:
      - id: failure_history
        type: markdown
        required: true
        description: The recorded failures to learn from.
      - id: target
        type: markdown
        required: true
        description: The prompt, tool, skill, or workflow to improve.
    produces:
      - improvement-scope
  - id: detect
    type: agent_task
    title: Detect repeated pattern
    description: Identify the repeated failure pattern with evidence.
    instructions: Cluster the failure history and identify the pattern that recurs, citing the specific failures as evidence
      that it is systemic rather than a one-off. This step needs a reliability-analyst agent supplied by the consumer.
    agent: reliability-analyst
    requires:
      - improvement-scope
    produces:
      - pattern-evidence
  - id: propose
    type: agent_task
    title: Propose improvement
    description: Propose a targeted improvement for the pattern.
    instructions: Propose the smallest change to the target that addresses the identified pattern and is reversible, describing
      how it should be tested against the failures. This step needs a reliability-analyst agent supplied by the consumer.
    agent: reliability-analyst
    requires:
      - pattern-evidence
    produces:
      - improvement-draft
  - id: test
    type: tool
    title: Test the improvement
    description: Test the improvement against the failure pattern.
    instructions: Run the project test command with the proposed improvement applied and capture stdout, stderr, and the exit
      code as evidence that the change addresses the pattern without regressions.
    command: ${param.test_command}
    parameters:
      - id: test_command
        type: command
        required: false
        default: make test || npm test || pytest -q
        description: The command that exercises the improvement against the failure pattern.
    tool: command-runner
    requires:
      - improvement-draft
    produces:
      - improvement-test
    on_failure:
      action: abort
  - id: verify
    type: verifier
    title: Verify and plan rollout
    description: Confirm the improvement is tested and plan a reversible rollout.
    instructions: Confirm the test evidence shows the improvement addresses the pattern, then plan a rollout that can be reverted
      cleanly if the change regresses.
    requires:
      - improvement-test
    produces:
      - rollout-plan
  - id: final
    type: finalizer
    title: Close out improvement
    description: Return the improvement and the rollout plan.
    instructions: Return the proposed improvement with the pattern it addresses and the reversible rollout plan.
    requires:
      - pattern-evidence
      - rollout-plan
    produces:
      - improvement
      - rollout_plan
edges:
  - from: intake
    to: detect
  - from: detect
    to: propose
  - from: propose
    to: test
  - from: test
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: repeated-pattern-evidence
    title: Repeated pattern evidence exists
    type: artifact
    required: true
    evidence: The pattern evidence shows the failure recurs, not a one-off.
    evidence_refs:
      - pattern-evidence
  - id: improvement-tested-and-reversible
    title: Improvement is tested and reversible
    type: command
    required: true
    command: make test || npm test || pytest -q
    evidence: The improvement is tested and the rollout is reversible.
    evidence_refs:
      - improvement-test
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - failures.analyzed
    - duration.seconds
