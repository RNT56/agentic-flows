spec_version: agentic-flows/v1
id: orchestration.skill-authoring
version: 0.1.0
title: Skill authoring
summary: Turn repeated domain knowledge into a reusable skill with triggers, instructions, assets, and examples.
stability: experimental
owners:
  - RNT56
tags:
  - orchestration
  - skill
  - knowledge
entrypoint: intake
runtime:
  supported_cores:
    - thinclaw
    - nilcore
    - standalone
  required_capabilities:
    - knowledge.read
    - evidence.capture
  adapter_hints:
    nilcore:
      execution_mode: sandboxed-worker
    thinclaw:
      routine_type: operator-supervised
contracts:
  inputs:
    - id: domain_knowledge
      type: markdown
      required: true
      description: The repeated domain knowledge to capture.
    - id: trigger
      type: markdown
      required: true
      description: When the skill should apply.
  outputs:
    - id: skill
      type: markdown
      required: true
      description: The reusable skill with triggers, instructions, and assets.
    - id: validation_examples
      type: json
      required: true
      description: Examples that demonstrate the skill applying correctly.
  artifacts:
    - skill-draft
    - validation-examples
nodes:
  - id: intake
    type: intake
    title: Intake knowledge
    description: Capture the domain knowledge and the trigger conditions.
    instructions: Record the repeated domain knowledge to capture and the trigger that says when the skill should apply, so
      the author can scope the skill to exactly that situation.
    inputs_schema:
      - id: domain_knowledge
        type: markdown
        required: true
        description: The repeated domain knowledge to capture.
      - id: trigger
        type: markdown
        required: true
        description: When the skill should apply.
    produces:
      - skill-scope
  - id: author
    type: agent_task
    title: Author the skill
    description: Write the skill with triggers, instructions, and any required assets.
    instructions: Write the skill so it names its trigger conditions, gives step-by-step instructions an agent can follow,
      and lists any assets it needs. Keep it scoped to the captured domain knowledge and avoid duplicating knowledge already
      covered elsewhere.
    agent: skill-author
    requires:
      - skill-scope
    produces:
      - skill-draft
  - id: examples
    type: agent_task
    title: Add validation examples
    description: Add examples that demonstrate the skill applying correctly.
    instructions: Add concrete examples that show the trigger firing and the skill producing the right behavior, including
      at least one boundary or near-miss case. Each example should be runnable evidence that the skill applies correctly.
    agent: skill-author
    requires:
      - skill-draft
    produces:
      - validation-examples
  - id: verify
    type: verifier
    title: Verify the skill
    description: Confirm triggers, instructions, assets, and validation examples are present.
    instructions: Confirm the skill declares trigger conditions, actionable instructions, and required assets, and that the
      validation examples actually demonstrate it applying. Flag any missing element rather than passing it.
    requires:
      - skill-draft
      - validation-examples
    produces:
      - skill-check
  - id: final
    type: finalizer
    title: Close out skill
    description: Return the skill and its validation examples.
    instructions: Return the finished skill and its validation examples, ready for reuse.
    requires:
      - skill-draft
      - validation-examples
      - skill-check
    produces:
      - skill
      - validation_examples
edges:
  - from: intake
    to: author
  - from: author
    to: examples
  - from: examples
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: skill-elements-present
    title: Triggers, instructions, and assets present
    type: review
    required: true
    evidence: The skill declares trigger conditions, instructions, and required assets.
    evidence_refs:
      - skill-draft
  - id: validation-examples-present
    title: Validation examples present
    type: artifact
    required: true
    evidence: The skill includes examples demonstrating correct application.
    evidence_refs:
      - validation-examples
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - examples.count
    - duration.seconds
