spec_version: agentic-flows/v1
id: orchestration.tool-creation
version: 0.1.0
title: Tool creation
summary: Create a new tool or adapter with a schema, a sandbox and permission profile, and failure-covering tests.
stability: experimental
owners:
  - RNT56
tags:
  - orchestration
  - tooling
  - adapter
entrypoint: intake
runtime:
  supported_cores:
    - nilcore
    - crustcore
    - standalone
  required_capabilities:
    - tool.author
    - command.run
    - evidence.capture
  adapter_hints:
    crustcore:
      proof_surface: verified-patch
    nilcore:
      execution_mode: sandboxed-worker
contracts:
  inputs:
    - id: need
      type: markdown
      required: true
      description: The capability gap the new tool must fill.
    - id: repo
      type: uri
      required: true
      description: Repository or local checkout target.
  outputs:
    - id: tool_patch
      type: patch
      required: true
      description: The new tool implementation and its tests.
    - id: tool_schema
      type: json
      required: true
      description: The tool schema with sandbox and permission profile.
  artifacts:
    - tool-schema
    - tool-diff
    - test-log
nodes:
  - id: intake
    type: intake
    title: Intake tool need
    description: Capture the capability gap and confirm existing tools are inadequate.
    produces:
      - tool-need
  - id: design
    type: agent_task
    title: Design tool schema
    description: Define the tool schema, sandbox boundary, and permission profile.
    agent: tool-author
    requires:
      - tool-need
    produces:
      - tool-schema
  - id: build
    type: agent_task
    title: Build the tool
    description: Implement the tool against the schema.
    agent: coding-worker
    requires:
      - tool-schema
    produces:
      - tool-diff
  - id: test
    type: tool
    title: Test failure modes
    description: Run tests that cover the tool's failure modes, not just the happy path.
    tool: command-runner
    requires:
      - tool-diff
    produces:
      - test-log
  - id: verify
    type: verifier
    title: Verify schema and tests
    description: Confirm the schema and permission profile exist and failure tests pass.
    requires:
      - tool-schema
      - test-log
    produces:
      - tool-check
  - id: final
    type: finalizer
    title: Close out tool
    description: Return the tool patch and its schema.
    requires:
      - tool-schema
      - tool-check
    produces:
      - tool_patch
      - tool_schema
edges:
  - from: intake
    to: design
  - from: design
    to: build
  - from: build
    to: test
  - from: test
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: schema-and-profile
    title: Tool schema and permission profile declared
    type: artifact
    required: true
    evidence: The tool schema declares its sandbox boundary and permission profile.
    evidence_refs:
      - tool-schema
  - id: failure-tests
    title: Tests cover failure modes
    type: command
    required: true
    command: make test || npm test || pytest -q
    evidence: Tests cover the tool's failure modes and pass.
    evidence_refs:
      - test-log
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - failure.cases
    - duration.seconds
