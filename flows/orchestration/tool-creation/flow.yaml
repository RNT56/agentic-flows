spec_version: agentic-flows/v1
id: orchestration.tool-creation
version: 0.1.0
title: Tool creation
summary: Create a new tool or adapter with a schema, a sandbox and permission profile, and failure-covering tests.
stability: experimental
owners:
  - RNT56
tags:
  - orchestration
  - tooling
  - adapter
entrypoint: intake
runtime:
  supported_cores:
    - nilcore
    - crustcore
    - standalone
  required_capabilities:
    - tool.author
    - command.run
    - evidence.capture
  adapter_hints:
    crustcore:
      proof_surface: verified-patch
    nilcore:
      execution_mode: sandboxed-worker
contracts:
  inputs:
    - id: need
      type: markdown
      required: true
      description: The capability gap the new tool must fill.
    - id: repo
      type: uri
      required: true
      description: Repository or local checkout target.
  outputs:
    - id: tool_patch
      type: patch
      required: true
      description: The new tool implementation and its tests.
    - id: tool_schema
      type: json
      required: true
      description: The tool schema with sandbox and permission profile.
  artifacts:
    - tool-schema
    - tool-diff
    - test-log
nodes:
  - id: intake
    type: intake
    title: Intake tool need
    description: Capture the capability gap and confirm existing tools are inadequate.
    instructions: Record the capability gap the new tool must fill and the repo target, and confirm no existing tool already
      covers the need before authoring a new one.
    inputs_schema:
      - id: need
        type: markdown
        required: true
        description: The capability gap the new tool must fill.
      - id: repo
        type: uri
        required: true
        description: Repository or local checkout target.
    produces:
      - tool-need
  - id: design
    type: agent_task
    title: Design tool schema
    description: Define the tool schema, sandbox boundary, and permission profile.
    instructions: Define the tool schema together with its sandbox boundary and the least-privilege permission profile it
      needs. Make inputs, outputs, and the permission set explicit so the build step and the runtime can enforce them. This
      step needs a tool-author agent supplied by the consumer.
    agent: tool-author
    requires:
      - tool-need
    produces:
      - tool-schema
  - id: build
    type: agent_task
    title: Build the tool
    description: Implement the tool against the schema.
    instructions: Implement the tool so it matches the schema exactly, honors the declared sandbox boundary and permissions,
      and returns clear errors on failure rather than crashing. This step needs a coding agent supplied by the consumer.
    agent: coding-worker
    requires:
      - tool-schema
    produces:
      - tool-diff
  - id: test
    type: tool
    title: Test failure modes
    description: Run tests that cover the tool's failure modes, not just the happy path.
    instructions: Run the test suite and capture stdout, stderr, and the exit code, ensuring the tool's failure modes are
      exercised and not just the happy path.
    command: ${param.test_command}
    parameters:
      - id: test_command
        type: command
        required: false
        default: make test || npm test || pytest -q || go test ./...
        description: The command that runs the tool's tests, including its failure-mode cases.
    tool: command-runner
    requires:
      - tool-diff
    produces:
      - test-log
    on_failure:
      action: abort
  - id: verify
    type: verifier
    title: Verify schema and tests
    description: Confirm the schema and permission profile exist and failure tests pass.
    instructions: Confirm the tool schema declares its sandbox boundary and permission profile, and that the test log shows
      the failure-mode tests actually ran and passed. Reject the tool if either is missing.
    requires:
      - tool-schema
      - test-log
    produces:
      - tool-check
  - id: final
    type: finalizer
    title: Close out tool
    description: Return the tool patch and its schema.
    instructions: Return the tool patch with its tests and the verified tool schema, ready to register.
    requires:
      - tool-schema
      - tool-check
    produces:
      - tool_patch
      - tool_schema
edges:
  - from: intake
    to: design
  - from: design
    to: build
  - from: build
    to: test
  - from: test
    to: verify
  - from: verify
    to: final
quality_gates:
  - id: schema-and-profile
    title: Tool schema and permission profile declared
    type: artifact
    required: true
    evidence: The tool schema declares its sandbox boundary and permission profile.
    evidence_refs:
      - tool-schema
  - id: failure-tests
    title: Tests cover failure modes
    type: command
    required: true
    command: make test || npm test || pytest -q
    evidence: Tests cover the tool's failure modes and pass.
    evidence_refs:
      - test-log
observability:
  events:
    - flow.started
    - node.completed
    - gate.completed
    - flow.completed
  metrics:
    - failure.cases
    - duration.seconds
