spec_version: agentic-flows/v1.1
id: engineering.invalid-parameter-reference
version: 0.1.0
title: Invalid parameter reference
summary: A flow whose gate command references a parameter that is not declared.
stability: experimental
owners:
  - RNT56
tags:
  - test
entrypoint: intake
runtime:
  supported_cores:
    - standalone
  required_capabilities:
    - command.run
contracts:
  inputs:
    - id: repo
      type: uri
      required: true
      description: The repository under test.
  outputs:
    - id: result
      type: markdown
      required: true
      description: The result summary.
  artifacts:
    - test-log
nodes:
  - id: intake
    type: intake
    title: Intake scope
    description: Capture the repository and scope for the run.
    produces:
      - scope
  - id: test
    type: tool
    title: Run tests
    description: Run the project tests for the scope.
    tool: command-runner
    requires:
      - scope
    produces:
      - test-log
  - id: final
    type: finalizer
    title: Close out
    description: Return the result summary for the run.
    requires:
      - test-log
    produces:
      - result
edges:
  - from: intake
    to: test
  - from: test
    to: final
quality_gates:
  - id: tests-pass
    title: Tests pass
    type: command
    required: true
    command: "{{param.missing}}"
    evidence: The test command output.
    evidence_refs:
      - test-log
observability:
  events:
    - flow.started
    - flow.completed
