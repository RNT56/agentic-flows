spec_version: agentic-flows/v1
id: fixture.invalid-gate-evidence-ref
version: 0.1.0
title: Invalid gate evidence reference fixture
summary: A fixture whose required gate references evidence that is not declared.
stability: experimental
owners:
  - agentic-flows
tags:
  - fixture
entrypoint: intake
runtime:
  supported_cores:
    - standalone
  required_capabilities:
    - validation
contracts:
  inputs:
    - id: task
      type: text
      required: true
  outputs:
    - id: report
      type: markdown
      required: true
  artifacts:
    - declared-proof
nodes:
  - id: intake
    type: intake
    title: Intake
    description: Capture the task.
    produces:
      - scoped-task
  - id: final
    type: finalizer
    title: Final
    description: Return the result.
    requires:
      - scoped-task
    produces:
      - report
edges:
  - from: intake
    to: final
quality_gates:
  - id: fixture-required-gate
    title: Required gate
    type: review
    required: true
    evidence_refs:
      - undeclared-proof
observability:
  events:
    - flow.started
    - flow.completed
